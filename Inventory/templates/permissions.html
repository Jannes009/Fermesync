{% extends "inventory_base.html" %}
{% block content %}
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #f5f5f5;
        padding: 20px;
        margin: 0;
    }
    h1 {
        text-align: center;
        margin-bottom: 25px;
    }
    form {
        background: white;
        max-width: 1100px;
        margin: auto;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }
    .container {
        display: flex;
        gap: 40px;
        margin-top: 25px;
    }
    .box {
        flex: 1;
        background: #fafafa;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #ddd;
        max-height: 400px;
        overflow-y: auto;
    }
    .filter-input {
        margin-bottom: 10px;
        width: 100%;
        padding: 8px;
    }
    input[type="checkbox"] {
        transform: scale(1.1);
        margin-right: 6px;
    }
    button {
        margin-top: 25px;
        padding: 12px 25px;
        background: #007bff;
        color: white;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }
    @media(max-width: 768px) {
        .container { flex-direction: column; }
    }
</style>

    <h1>Manage User Permissions & Warehouses</h1>

    <form method="POST">

        <label>Select User:</label>
        <select name="user_id" id="user_id" required>
            <option value="">-- Select User --</option>
            {% for user in users %}
                <option value="{{ user[0] }}">{{ user[1] }}</option>
            {% endfor %}
        </select>

        <div class="container">

            <div class="box">
                <h3>Permissions</h3>
                <input type="text" class="filter-input" placeholder="Search..." onkeyup="filterList(this, 'permissions')">
                <div id="permissions-list">
                    {% for perm in permissions %}
                        <label>
                            <input type="checkbox" name="permissions" value="{{ perm[0] }}">
                            {{ perm[1] }}
                        </label><br>
                    {% endfor %}
                </div>
            </div>

            <div class="box">
                <h3>Warehouses</h3>
                <input type="text" class="filter-input" placeholder="Search..." onkeyup="filterList(this, 'warehouses')">
                <div id="warehouses-list">
                    {% for wh in warehouses %}
                        <label>
                            <input type="checkbox" name="warehouses" value="{{ wh[0] }}">
                            {{ wh[1] }}
                        </label><br>
                    {% endfor %}
                </div>
            </div>

        </div>

        <button type="submit">Save</button>

    </form>

</div>

<script>
    function filterList(input, section) {
        const filter = input.value.toLowerCase();
        const labels = document.querySelectorAll(`#${section}-list label`);
        labels.forEach(label => {
            const txt = label.innerText.toLowerCase();
            label.style.display = txt.includes(filter) ? "" : "none";
        });
    }

    // ---------------------------
    // Auto-load existing settings
    // ---------------------------
    document.getElementById("user_id").addEventListener("change", function () {
        const userId = this.value;

        // Clear all checkboxes
        document.querySelectorAll("input[type='checkbox']").forEach(cb => cb.checked = false);

        if (!userId) return;

        fetch(`/admin/get_user_settings/${userId}`)
            .then(r => r.json())
            .then(data => {
                const { permissions, warehouses } = data;

                // Tick permissions
                permissions.forEach(id => {
                    const cb = document.querySelector(`input[name='permissions'][value='${id}']`);
                    if (cb) cb.checked = true;
                });

                // Tick warehouses
                warehouses.forEach(id => {
                    const cb = document.querySelector(`input[name='warehouses'][value='${id}']`);
                    if (cb) cb.checked = true;
                });
            });
    });
</script>
{% endblock %}
