<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Dashboard - Fermesync</title>
    <link rel="stylesheet" href="{{ url_for('inventory.static', filename='color-template.css') }}">
    <style>
        body {
            background: var(--primary-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .main-content {
            flex: 1;
            padding: 30px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .dashboard-title {
            font-size: 2rem;
            color: var(--primary-text);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .dashboard-subtitle {
            color: var(--secondary-text);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 30px;
        }

        .dashboard-card {
            background: var(--container-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(44, 62, 80, 0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            min-height: 200px;
        }

        .dashboard-card:hover {
            box-shadow: 0 8px 32px rgba(44, 62, 80, 0.16);
            transform: translateY(-4px);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-text);
            margin-bottom: 8px;
        }

        .card-description {
            color: var(--secondary-text);
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .card-button {
            background: var(--button-bg);
            color: var(--button-text);
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: auto;
        }

        .card-button:hover {
            background: var(--button-hover);
            transform: scale(1.05);
        }

        .card-button:active {
            transform: scale(0.98);
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 20px 15px;
            }

            .dashboard-title {
                font-size: 1.5rem;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .dashboard-card {
                min-height: 160px;
                padding: 18px;
            }

            .card-icon {
                font-size: 2.5rem;
            }

            .card-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    {% include 'inventory-taskbar.html' %}

    <div class="main-content">
        <h1 class="dashboard-title">Inventory Dashboard</h1>
        <p class="dashboard-subtitle">Manage your inventory operations</p>

        <div class="dashboard-grid">
            <a href="{{ url_for('inventory.GRV_page') }}" class="dashboard-card">
                <div class="card-icon">📋</div>
                <div class="card-title">Goods Receipt Voucher</div>
                <div class="card-description">Create and manage goods receipt vouchers</div>
                <button class="card-button" type="button">Open GRV</button>
            </a>
        </div>
    </div>

    <script>
        // Ensure card links work properly
        document.querySelectorAll('.dashboard-card').forEach(card => {
            card.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    this.click();
                }
            });
        });
    </script>
</body>
</html>
