{% extends 'inventory_base.html' %}
{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    * { box-sizing: border-box; }
    body {
        background: var(--primary-bg);
        color: var(--primary-text);
        font-size: 0.95rem;
        margin: 0; padding: 0;
        min-height: 100vh;
        font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
    }

    .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1rem;
    }

    .card {
        background: var(--container-bg);
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
        box-shadow: 0 1px 6px rgba(44,62,80,0.08);
    }

    .dashboard-panel {
        padding: 1.5rem;
    }

    .panel-header {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
    }

    .panel-header h1 {
        margin: 0;
        font-size: 1.6rem;
    }

    .panel-header p {
        margin: 0;
        color: var(--muted-text, #7b8a99);
        font-size: 0.95rem;
    }

    .panel-header-actions {
        margin-top: 1rem;
    }

    @media(min-width:768px){
        .panel-header {
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header-actions {
            margin-top: 0;
        }
    }

    .btn-primary {
        background: var(--button-bg); color: var(--button-text);
        border: none; padding: 12px 16px;
        border-radius: 8px; cursor: pointer; font-size: 1rem;
    }

    .btn-ghost {
        background: transparent;
        color: var(--button-bg);
        border: 1px solid var(--button-bg);
        padding: 8px 12px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.9rem;
    }

    .hidden { display: none; }

    .panel-section + .panel-section {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--input-border);
    }

    .section-title-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 0.5rem;
        align-items: baseline;
        margin-bottom: 0.75rem;
    }

    .section-title-row h2 {
        margin: 0;
        font-size: 1.2rem;
    }

    .section-hint {
        font-size: 0.85rem;
        color: var(--muted-text, #7b8a99);
    }

    .form-row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
    }

    .form-row label { 
        width: 140px; 
        font-weight: 600; 
    }
    
    .form-row select, .form-row input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--input-border);
        background: var(--form-bg);
    }

    .transfer-table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
    }

    .transfer-table th, .transfer-table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid var(--input-border);
    }

    .transfer-table th {
        background: var(--form-bg);
        font-weight: 600;
    }

    .product-select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 5px;
        border: 1px solid var(--input-border);
        background: white;
    }

    .qty-input {
        width: 80px;
        padding: 8px;
        border: 1px solid var(--input-border);
        border-radius: 5px;
        text-align: center;
    }

    .uom-label {
        margin-left: 8px;
        font-weight: bold;
        color: #495057;
    }

    .remove-btn {
        background: #dc3545;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
    }

    .remove-btn:hover {
        background: #c82333;
    }

    .action-buttons {
        display: flex;
        gap: 12px;
        margin-top: 1rem;
        flex-wrap: wrap;
    }

    .btn-action {
        padding: 12px 20px;
        border-radius: 6px;
        border: none;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 44px;
    }

    .btn-action.success {
        background: var(--button-bg);
        color: var(--button-text);
    }

    .btn-action.success:hover {
        background: var(--button-hover, #0056b3);
    }

    .btn-action.primary {
        background: var(--button-bg);
        color: var(--button-text);
    }

    .btn-action.primary:hover {
        background: var(--button-hover, #0056b3);
    }

    @media (max-width: 768px) {
        .form-row {
            flex-direction: column;
            align-items: stretch;
        }
        
        .form-row label {
            width: auto;
            margin-bottom: 4px;
        }
        
        .transfer-table {
            font-size: 0.9rem;
        }
        
        .transfer-table th, .transfer-table td {
            padding: 8px;
        }
        
        .action-buttons {
            justify-content: stretch;
        }
        
        .btn-action {
            flex: 1;
            justify-content: center;
        }
    }
</style>

<div class="wrap with-fixed-taskbar">
    <div class="card dashboard-panel">
        <div class="panel-header">
            <div>
                <h1>Warehouse Transfer</h1>
                <p>Transfer products between warehouses</p>
            </div>
        </div>

        <div class="panel-section">
            <div class="form-row">
                <label>From Warehouse</label>
                <select id="fromWarehouse">
                    <option></option>
                </select>
            </div>

            <div class="form-row">
                <label>To Warehouse</label>
                <select id="toWarehouse">
                    <option></option>
                </select>
            </div>
        </div>

        <div class="panel-section">
            <div class="section-title-row">
                <h2>Transfer Lines</h2>
            </div>

            <table class="transfer-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="transferLines"></tbody>
            </table>

            <div class="action-buttons">
                <button class="btn-action success" onclick="addLine()">
                    <i class="fas fa-plus"></i>
                    Add Line
                </button>
                <button class="btn-action primary" onclick="saveTransfer()">
                    <i class="fas fa-paper-plane"></i>
                    Submit Transfer
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<script>
let products = []
document.addEventListener("DOMContentLoaded", function(){

    $('#fromWarehouse').select2({
        placeholder: "Select From Warehouse",
        allowClear: true,
        width: '100%'
    })

    $('#toWarehouse').select2({
        placeholder: "Select To Warehouse",
        allowClear: true,
        width: '100%'
    })

    // attach change AFTER select2
    $('#fromWarehouse').on('change', loadProductsForWarehouse)

    loadData()
})

// Auto focus Select2 search
$(document).on('select2:open', () => {
    document.querySelector('.select2-container--open .select2-search__field').focus();
});

// LOAD WAREHOUSES
function loadData(){
    fetch("/inventory/fetch_warehouses")
    .then(r=>r.json())
    .then(data=>{
        populateWarehouses(data.warehouses)
    })
}

// POPULATE WAREHOUSES
function populateWarehouses(warehouses){

    let from = document.getElementById("fromWarehouse")
    let to = document.getElementById("toWarehouse")

    warehouses.forEach(w=>{
        let opt1 = new Option(w.code + " - " + w.name, w.id)
        let opt2 = new Option(w.code + " - " + w.name, w.id)

        from.add(opt1)
        to.add(opt2)
    })

    // refresh select2
    $('#fromWarehouse').trigger('change.select2')
    $('#toWarehouse').trigger('change.select2')
}

    // LOAD PRODUCTS FOR SELECTED WAREHOUSE
    function loadProductsForWarehouse(){

        let fromWarehouse = $('#fromWarehouse').val()

        if(!fromWarehouse) return

        fetch(`/inventory/SDK/fetch_products_in_warehouse?warehouse_id=${fromWarehouse}`)
        .then(r=>r.json())
        .then(data=>{
            products = data.products || []

            document.getElementById("transferLines").innerHTML = ""

            if(products.length > 0){
                addLine()
            }
        })
    }

// CREATE PRODUCT OPTIONS
function buildProductOptions(){
    return products.map(p =>
        `<option value="${p.product_link}" data-uom="${p.stocking_uom_code}">
            ${p.product_code} - ${p.product_desc} (${parseFloat(p.qty_in_whse).toFixed(2)} ${p.stocking_uom_code} available)
        </option>`
    ).join("")
}

// ADD LINE
function addLine(){
    if(products.length === 0){
        Swal.fire("Select Warehouse", "Please select a From Warehouse first", "warning")
        return
    }

    let table = document.getElementById("transferLines")
    let row = document.createElement("tr")

    row.innerHTML = `
        <td>
            <select class="product-select" onchange="updateUOM(this)">
                <option value="">Select product...</option>
                ${buildProductOptions()}
            </select>
        </td>
        <td>
            <input type="number" step="0.001" min="0" class="qty-input">
            <span class="uom-label"></span>
        </td>
        <td>
            <button class="remove-btn" onclick="removeLine(this)" title="Remove line">
                <i class="fas fa-trash"></i>
            </button>
        </td>
    `

    table.appendChild(row)

    $(row).find('.product-select').select2({
        placeholder: "Select product",
        allowClear: true,
        width: '100%',
        dropdownParent: $(row)
    });

    updateUOM(row.querySelector(".product-select"))
}

// UPDATE UOM
function updateUOM(select){
    let row = select.closest("tr")
    let option = select.selectedOptions[0]
    let uom = option ? option.dataset.uom : ""
    row.querySelector(".uom-label").textContent = uom
}

// REMOVE LINE
function removeLine(btn){
    btn.closest("tr").remove()
}

// SAVE TRANSFER
function saveTransfer(){
    let fromWarehouse = $('#fromWarehouse').val()
    let toWarehouse = $('#toWarehouse').val()

    if(fromWarehouse === "" || toWarehouse === ""){
        Swal.fire("Missing Information", "Please select both warehouses", "warning")
        return
    }

    if(fromWarehouse == toWarehouse){
        Swal.fire("Invalid Selection", "From and To warehouse cannot be the same", "error")
        return
    }

    let lines = []
    document.querySelectorAll("#transferLines tr").forEach(row=>{
        let stockId = row.querySelector(".product-select").value
        let qty = row.querySelector(".qty-input").value

        if(qty && qty > 0){
            lines.push({
                stockId: stockId,
                qty: qty
            })
        }
    })

    if(lines.length === 0){
        Swal.fire("No Lines", "Please enter at least one transfer line", "warning")
        return
    }

    fetch("/inventory/warehouse-transfer/save",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            fromWarehouse: fromWarehouse,
            toWarehouse: toWarehouse,
            lines: lines
        })
    })
    .then(r=>r.json())
    .then(res=>{
        if(res.success){
            Swal.fire("Success", "Transfer saved successfully", "success").then(() => {
                location.reload()
            })
        } else {
            Swal.fire("Error", res.message || "Failed to save transfer", "error")
        }
    })
    .catch(err => {
        Swal.fire("Error", "An error occurred while saving the transfer", "error")
    })
}
</script>

{% endblock %}
