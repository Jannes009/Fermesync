{% extends 'inventory_base.html' %}
{% block content %}
  <style>
    * { box-sizing: border-box; }
    body { background: var(--primary-bg); color: var(--primary-text); font-size: 0.9rem; margin: 0; padding: 0; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .page-content { display: flex; flex-direction: column; flex: 1; }
    .wrap { width: 100%; margin: 0 auto; padding: 1rem; max-width: 1100px; }
    .wrap.with-fixed-taskbar { padding-top: 1rem; margin-top: 60px; }
    .card { background: var(--container-bg); border-radius: 8px; box-shadow: 0 1px 6px rgba(44,62,80,0.08); padding: 1rem; margin-bottom: 1rem; }
    header h1 { margin: 0; font-size: 1.4rem; color: var(--primary-text); }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    .form-group label { font-weight: 600; color: var(--secondary-text); display: block; margin-bottom: 6px; font-size: 0.9rem; }
    .form-group select, .form-group input { width: 100%; padding: 12px 14px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--form-bg); font-size: 1rem; }
    .form-group select:focus, .form-group input:focus { outline: none; border-color: var(--input-focus); box-shadow: 0 0 0 2px var(--input-shadow); }

    /* Buttons */
    .btn-primary { width: 100%; background: var(--button-bg); color: var(--button-text); border: none; padding: 14px 16px; border-radius: 8px; font-size: 1rem; margin-top: 1rem; cursor: pointer; font-weight: 600; }
    .btn-primary:hover { background: var(--button-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .hidden { display: none; }

    /* Product Row — Compact & Beautiful */
    .product-row {
      display: grid;
      grid-template-columns: 1fr 70px auto;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--form-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      min-height: 44px;
    }
    
    .product-row:hover {
      border-color: var(--button-bg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    
    .product-row.hidden-by-search {
      display: none;
    }
    
    .product-row.focused {
      background: var(--button-bg);
      color: var(--button-text);
      border-color: var(--button-bg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    
    .product-desc {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    
    .qty-input {
      height: 36px;
      font-size: 1rem;
      font-weight: bold;
      text-align: center;
      border: 2px solid var(--input-border);
      border-radius: 5px;
      background: white;
      color: black;
      -moz-appearance: textfield;
      appearance: textfield;
      padding: 0;
    }
    
    .qty-input::-webkit-inner-spin-button,
    .qty-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    
    .qty-input:focus {
      outline: none;
      border-color: var(--button-bg);
      box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
    }
    
    .uom-label {
      background: #e9ecef;
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
      color: #495057;
      white-space: nowrap;
    }

    /* Recount Card */
    .recount-card {
      background: #fff3cd;
      border: 2px solid #ffeaa7;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    
    .recount-title { font-weight: bold; color: #856404; font-size: 1rem; }
    .recount-badge { background: #f39c12; color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    
    .recount-input {
      height: 40px;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      border: 2px solid #f39c12;
      border-radius: 6px;
      background: white;
      color: black;
      -moz-appearance: textfield;
      appearance: textfield;
      padding: 0;
    }
    
    .recount-input:focus {
      outline: none;
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(243,156,18,0.3);
    }

    /* Progress */
    .progress-info, .completed-info { 
      padding: 0.6rem; 
      border-radius: 6px; 
      text-align: center; 
      font-size: 0.85rem; 
      margin-bottom: 0.75rem; 
      font-weight: 500;
    }
    .progress-info { background: #e8f4fd; color: #2980b9; }
    .completed-info { background: #d4edda; color: #155724; }

    /* ====== STICKY COMMAND BAR ====== */
    .command-bar {
      position: fixed;
      bottom: env(safe-area-inset-bottom);
      left: 0;
      right: 0;
      height: 48px;
      background: #fff;
      border-top: 1px solid #ddd;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
    }

    .command-bar.hidden {
      display: none;
    }

    .command-bar-content {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .search-input {
      flex: 1;
      height: 36px;
      padding: 0 10px;
      font-size: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: white;
      color: black;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--button-bg);
      box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
    }

    .counter-badge {
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 5px;
      background: var(--button-bg);
      color: var(--button-text);
      white-space: nowrap;
      font-weight: 600;
      min-width: 48px;
      text-align: center;
    }

    .command-bar-buttons {
      display: flex;
      gap: 4px;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-icon i {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .btn-icon.secondary {
      background: #6c757d;
      color: white;
    }

    .btn-icon.secondary:hover {
      background: #5a6268;
      transform: translateY(-1px);
    }

    .btn-icon.danger {
      background: #dc3545;
      color: white;
    }

    .btn-icon.danger:hover {
      background: #c82333;
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      .wrap { 
        padding: 0.5rem;
        padding-bottom: 60px;
      }
      
      .card { 
        padding: 0.5rem; 
      }
      
      header h1 { 
        font-size: 1.1rem; 
        margin-bottom: 0.5rem;
      }
      
      .product-row { 
        grid-template-columns: 1fr 60px auto; 
        gap: 6px; 
        padding: 6px 8px; 
        margin-bottom: 4px;
        min-height: 40px;
      }
      
      .product-desc {
        font-size: 0.85rem;
      }
      
      .qty-input {
        height: 32px;
        font-size: 0.95rem;
      }
      
      .uom-label {
        font-size: 0.7rem;
        padding: 2px 5px;
      }
      
      .command-bar { 
        padding: 2px 6px;
        height: 44px;
      }
      
      .search-input {
        height: 32px;
        font-size: 14px;
        padding: 0 8px;
      }
      
      .btn-icon {
        width: 32px;
        height: 32px;
        font-size: 14px;
      }
      
      .counter-badge {
        font-size: 11px;
        padding: 4px 6px;
        min-width: 42px;
      }
    }

    /* Prevent iPhone input zoom */
    input, select, textarea, .select2-container--default .select2-selection--single {
      font-size: 16px !important;
    }
    .select2-container--default .select2-selection--single .select2-selection__rendered,
    .select2-container--default .select2-selection--single .select2-selection__arrow {
      font-size: 16px !important;
      line-height: 30px !important; 
    }
  </style>


<div class="page-content">
  <div class="wrap">
    <div class="card">
      <header><h1>Stock Count</h1></header>
      <form id="stockCountForm">

        <!-- STEP 1 -->
        <section id="step-1">
          <h3 class="step-header">Select Location</h3>
          <div class="form-group">
            <label for="warehouse-select">Warehouse</label>
            <select id="warehouse-select"><option>Loading...</option></select>
          </div>
          <div class="form-group">
            <label for="category-select">Category</label>
            <select id="category-select" disabled><option>Select warehouse first</option></select>
          </div>
          <button type="button" id="step-1-next" class="btn-primary">Start Counting</button>
        </section>

        <!-- STEP 2 -->
        <section id="step-2" class="hidden">
          <h3 class="step-header">Count Products</h3>
          <div class="progress-info" id="progress-info">Counting products... <span id="progress-text">0/0</span></div>
          <div id="products-container"></div>
          <button type="button" id="step-2-next" class="btn-primary">Complete Count</button>
        </section>

        <!-- STEP 3 -->
        <section id="step-3" class="hidden">
          <h3 class="step-header">Recount Differences</h3>
          <div class="progress-info" id="recount-info">Please recount the following items</div>
          <div id="recount-container"></div>
          <button type="button" id="step-3-next" class="btn-primary" disabled>Finalize Count</button>
        </section>

      </form>
    </div>
  </div>

  <!-- STICKY COMMAND BAR -->
  <div class="command-bar" id="commandBar">
    <div class="command-bar-content">
      <input 
        type="text" 
        id="commandSearch" 
        class="search-input" 
        placeholder="🔍 Search / Scan..."
        autocomplete="off"
      >
      <div class="counter-badge" id="counterBadge">0/0</div>
      <div class="command-bar-buttons">
        <button type="button" class="btn-icon danger" id="pauseBtn" title="Exit / Pause">
          <i class="fas fa-pause-circle"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('inventory.static', filename='stock_count/stock_count_setup.js') }}?{{ filemtime('inventory', 'stock_count/stock_count_setup.js') }}"></script>

<script src="{{ url_for('inventory.static', filename='stock_count/stock_count.js') }}?{{ filemtime('inventory', 'stock_count/stock_count.js') }}"></script>
{% endblock %}
