{% extends 'inventory_base.html' %}
{% block content %}

  <style>
    * { box-sizing: border-box; }
    body { background: var(--primary-bg); color: var(--primary-text); font-size: 0.9rem; margin: 0; padding: 0; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .page-content { display: flex; flex-direction: column; flex: 1; }
    .wrap { width: 100%; margin: 0 auto; padding: 1rem; max-width: 1100px; }
    .wrap.with-fixed-taskbar { padding-top: 1rem; margin-top: 60px; }
    .card { background: var(--container-bg); border-radius: 8px; box-shadow: 0 1px 6px rgba(44,62,80,0.08); padding: 1rem; margin-bottom: 1rem; }
    header h1 { margin: 0; font-size: 1.4rem; color: var(--primary-text); }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    .form-group label { font-weight: 600; color: var(--secondary-text); display: block; margin-bottom: 6px; font-size: 0.9rem; }
    .form-group select, .form-group input { width: 100%; padding: 12px 14px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--form-bg); font-size: 1rem; }
    .form-group select:focus, .form-group input:focus { outline: none; border-color: var(--input-focus); box-shadow: 0 0 0 2px var(--input-shadow); }

    /* Buttons */
    .btn-primary { width: 100%; background: var(--button-bg); color: var(--button-text); border: none; padding: 14px 16px; border-radius: 8px; font-size: 1rem; margin-top: 1rem; cursor: pointer; font-weight: 600; }
    .btn-primary:hover { background: var(--button-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .hidden { display: none; }

    /* Progress */
    .progress-info, .completed-info { padding: 0.75rem; border-radius: 6px; text-align: center; font-size: 0.9rem; margin-bottom: 1rem; }
    .progress-info { background: #e8f4fd; color: #2980b9; }
    .completed-info { background: #d4edda; color: #155724; }

    /* Product Row — Compact & Beautiful */
    .product-row {
      display: grid;
      grid-template-columns: 1fr 90px auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: var(--form-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .product-desc {
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .qty-input {
      height: 40px;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      border: 2px solid var(--input-border);
      border-radius: 6px;
      background: white;
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .qty-input::-webkit-inner-spin-button,
    .qty-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .qty-input:focus {
      outline: none;
      border-color: var(--button-bg);
      box-shadow: 0 0 0 3px rgba(0,123,255,0.2);
    }
    .uom-label {
      background: #e9ecef;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      color: #495057;
    }

    /* Recount Card */
    .recount-card {
      background: #fff3cd;
      border: 2px solid #ffeaa7;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .recount-title { font-weight: bold; color: #856404; font-size: 1rem; }
    .recount-badge { background: #f39c12; color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    .recount-input {
      width: 100%;
      height: 48px;
      font-size: 1.3rem;
      font-weight: bold;
      text-align: center;
      border: 2px solid #f39c12;
      border-radius: 6px;
      background: white;
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .recount-input:focus {
      outline: none;
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(243,156,18,0.3);
    }

    /* Step Header */
    .step-header {
      margin: 0 0 1rem 0;
      color: var(--primary-text);
      font-size: 1.1rem;
      border-bottom: 2px solid var(--button-bg);
      padding-bottom: 0.5rem;
    }

    /* Table */
    #poTableWrapper {
      margin-top: 1rem;
      overflow-x: auto;
    }
    #poTable {
      width: 100%;
      border-collapse: collapse;
      background: var(--container-bg);
      border-radius: 8px;
      overflow: hidden;
      min-width: 600px; /* Prevent squeezing too much */
    }
    #poTable th, #poTable td {
      padding: 12px;
      border-bottom: 1px solid var(--input-border);
      text-align: left;
      font-size: 0.9rem;
    }
    #poTable th {
      background: var(--form-bg);
      font-weight: 700;
      color: var(--secondary-text);
      white-space: nowrap;
    }
    #poTable tbody tr {
      cursor: pointer;
      transition: background 0.15s;
    }
    #poTable tbody tr:hover {
      background: var(--muted-bg);
    }
    .no-data {
      text-align: center;
      padding: 20px 14px;
      color: var(--secondary-text);
      font-style: italic;
    }

    @media (max-width: 480px) {
      .wrap { padding: 0.75rem; }
      .card { padding: 0.75rem; }
      header h1 { font-size: 1.2rem; }
      .product-row { grid-template-columns: 1fr 80px auto; gap: 8px; padding: 8px; }
      #poTable th, #poTable td {
        padding: 10px 8px;
        font-size: 0.85rem;
      }
    }
    /* Prevent iPhone input zoom */
input, select, textarea, .select2-container--default .select2-selection--single {
    font-size: 16px !important;
}
.select2-container--default .select2-selection--single .select2-selection__rendered,
.select2-container--default .select2-selection--single .select2-selection__arrow {
    font-size: 16px !important;
    line-height: 30px !important; 
}
  </style>

<div class="page-content">
  <div class="wrap">
    <div class="card">
      <header>
        <h1>Create GRV</h1>
      </header>

      <div class="form-group">
        <label for="supplier">Supplier Name</label>
        <select id="supplier"></select>
      </div>

      <div id="poTableWrapper" class="hidden">
        <table id="poTable">
          <thead>
            <tr>
              <th>PO Number</th>
              <th>Date</th>
              <th>Description</th>
              <th>Total Incl</th>
            </tr>
          </thead>
          <tbody id="poTableBody">
            <tr>
              <td class="no-data" colspan="4">Select a supplier</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="{{ url_for('inventory.static', filename='EvolutionSDK/GRV_summary.js') }}"></script>

{% endblock %}
