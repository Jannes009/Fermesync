{% extends 'inventory_base.html' %}
{% block content %}
  <style>
    * { box-sizing: border-box; }
    body { background: var(--primary-bg); color: var(--primary-text); font-size: 0.9rem; margin: 0; padding: 0; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .page-content { display: flex; flex-direction: column; flex: 1; }
    .wrap { width: 100%; margin: 0 auto; padding: 1rem; max-width: 1100px; }
    .wrap.with-fixed-taskbar { padding-top: 1rem; margin-top: 60px; }
    .card { background: var(--container-bg); border-radius: 8px; box-shadow: 0 1px 6px rgba(44,62,80,0.08); padding: 1rem; margin-bottom: 1rem; }
    header h1 { margin: 0; font-size: 1.4rem; color: var(--primary-text); }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    .form-group label { font-weight: 600; color: var(--secondary-text); display: block; margin-bottom: 6px; font-size: 0.9rem; }
    .form-group select, .form-group input { width: 100%; padding: 12px 14px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--form-bg); font-size: 1rem; }
    .form-group select:focus, .form-group input:focus { outline: none; border-color: var(--input-focus); box-shadow: 0 0 0 2px var(--input-shadow); }

    /* Buttons */
    .btn-primary { width: 100%; background: var(--button-bg); color: var(--button-text); border: none; padding: 14px 16px; border-radius: 8px; font-size: 1rem; margin-top: 1rem; cursor: pointer; font-weight: 600; }
    .btn-primary:hover { background: var(--button-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .hidden { display: none; }

    /* Progress */
    .progress-info, .completed-info { padding: 0.75rem; border-radius: 6px; text-align: center; font-size: 0.9rem; margin-bottom: 1rem; }
    .progress-info { background: #e8f4fd; color: #2980b9; }
    .completed-info { background: #d4edda; color: #155724; }

    /* Product Row — Compact & Beautiful */
    .product-row {
      display: grid;
      grid-template-columns: 1fr 90px auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: var(--form-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .product-desc {
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .qty-input {
      height: 40px;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      border: 2px solid var(--input-border);
      border-radius: 6px;
      background: white;
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .qty-input::-webkit-inner-spin-button,
    .qty-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .qty-input:focus {
      outline: none;
      border-color: var(--button-bg);
      box-shadow: 0 0 0 3px rgba(0,123,255,0.2);
    }
    .uom-label {
      background: #e9ecef;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      color: #495057;
    }

    /* Recount Card */
    .recount-card {
      background: #fff3cd;
      border: 2px solid #ffeaa7;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .recount-title { font-weight: bold; color: #856404; font-size: 1rem; }
    .recount-badge { background: #f39c12; color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    .recount-input {
      width: 100%;
      height: 48px;
      font-size: 1.3rem;
      font-weight: bold;
      text-align: center;
      border: 2px solid #f39c12;
      border-radius: 6px;
      background: white;
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .recount-input:focus {
      outline: none;
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(243,156,18,0.3);
    }

    /* Step Header */
    .step-header {
      margin: 0 0 1rem 0;
      color: var(--primary-text);
      font-size: 1.1rem;
      border-bottom: 2px solid var(--button-bg);
      padding-bottom: 0.5rem;
    }

    @media (max-width: 480px) {
      .wrap { padding: 0.75rem; }
      .card { padding: 0.75rem; }
      header h1 { font-size: 1.2rem; }
      .product-row { grid-template-columns: 1fr 80px auto; gap: 8px; padding: 8px; }
    }
    /* Prevent iPhone input zoom */
input, select, textarea, .select2-container--default .select2-selection--single {
    font-size: 16px !important;
}
.select2-container--default .select2-selection--single .select2-selection__rendered,
.select2-container--default .select2-selection--single .select2-selection__arrow {
    font-size: 16px !important;
    line-height: 30px !important; 
}
  </style>


<div class="page-content">
  <div class="wrap">
    <div class="card">
      <header><h1>Stock Count</h1></header>
      <form id="stockCountForm">

        <!-- STEP 1 -->
        <section id="step-1">
          <h3 class="step-header">Select Location</h3>
          <div class="form-group">
            <label for="warehouse-select">Warehouse</label>
            <select id="warehouse-select"><option>Loading...</option></select>
          </div>
          <div class="form-group">
            <label for="category-select">Category</label>
            <select id="category-select" disabled><option>Select warehouse first</option></select>
          </div>
          <div class="form-group">
            <label for="storeman-name">Storeman Name</label>
            <input type="text" id="storeman-name" placeholder="Enter your name" required>
          </div>
          <button type="button" id="step-1-next" class="btn-primary" disabled>Start Counting</button>
        </section>

        <!-- STEP 2 -->
        <section id="step-2" class="hidden">
          <h3 class="step-header">Count Products</h3>
          <div class="progress-info" id="progress-info">Counting products... <span id="progress-text">0/0</span></div>
          <div id="products-container"></div>
          <button type="button" id="step-2-next" class="btn-primary">Complete Count</button>
        </section>

        <!-- STEP 3 -->
        <section id="step-3" class="hidden">
          <h3 class="step-header">Recount Differences</h3>
          <div class="progress-info" id="recount-info">Please recount the following items</div>
          <div id="recount-container"></div>
          <button type="button" id="step-3-next" class="btn-primary" disabled>Finalize Count</button>
        </section>

      </form>
    </div>
  </div>
</div>
<script src="{{ url_for('inventory.static', filename='EvolutionSDK/stock_count.js') }}?{{ filemtime('inventory', 'EvolutionSDK/stock_count.js') }}"></script>
{% endblock %}
