<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('inventory.static', filename='color-template.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- jQuery (required by Select2) -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <title>Create IBT — Mobile Stepper</title>

  <style>
/* ----------- General Styles ----------- */
* { box-sizing: border-box; }

body {
  background: var(--primary-bg);
  color: var(--primary-text);
  font-size: 0.95rem;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.page-content { display: flex; flex-direction: column; flex: 1; }

.wrap {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem;
}

.wrap.with-fixed-taskbar { padding-top: 1.5rem; margin-top: 60px; }

.card {
  background: var(--container-bg);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(44,62,80,0.08);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
}

header h1 {
  margin: 0;
  font-size: 1.8rem;
  color: var(--primary-text);
}

label {
  font-weight: 600;
  color: var(--secondary-text);
  display: block;
  margin-bottom: 6px;
  font-size: 0.95rem;
}

/* ---------------- Dropdowns & Inputs ---------------- */
select, input[type="text"], input[type="number"], input[list] {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--input-border);
  border-radius: 8px;
  background: var(--form-bg);
  font-size: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input[list] { padding-right: 40px; }

select:focus, input:focus, input[list]:focus {
  outline: none;
  border-color: var(--input-focus);
  box-shadow: 0 0 0 3px var(--input-shadow);
}

/* ---------------- Buttons ---------------- */
.btn-primary {
  width: 100%;
  background: var(--button-bg);
  color: var(--button-text);
  border: none;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 1rem;
  margin-top: 1.5rem;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.2s, transform 0.1s;
}

.btn-secondary {
  background: #6c757d;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 0.9rem;
  cursor: pointer;
  font-weight: 500;
  transition: background 0.2s, transform 0.1s;
  margin-top: 1rem;
}

.btn-danger {
  background: #e74c3c;
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: background 0.2s;
  line-height: 1;
}

.btn-primary:hover { background: var(--button-hover); }
.btn-secondary:hover { background: #5a6268; }
.btn-danger:hover { background: #c0392b; }

button:active { transform: scale(0.98); }

/* ---------------- Hidden ---------------- */
.hidden { display: none; }

/* ---------------- IBT Lines ---------------- */
.ibt-line {
  background: #f8f9fa;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  border-left: 4px solid #3498db;
}

.ibt-line-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Product select (raw element) */
.product-select {
  flex: 1;
  min-width: 0 !important;
}

/* Select2 wrapper - CRITICAL FIX */
.ibt-line-row .select2-container {
  flex: 1 !important;
  min-width: 0 !important;
}

/* Qty input */
.qty-input {
  width: 80px;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
  text-align: center;
  flex-shrink: 0;
}

/* Stocking unit */
.stock-unit {
  font-weight: bold;
  color: #444;
  min-width: 55px;
  flex-shrink: 0;
  white-space: nowrap;
}

#ibt-lines-container { margin-top: 20px; }

#add-line-btn,
#step-2-next-btn { margin-top: 20px; }

/* ---------------- Section Animation ---------------- */
#ibt-step-2, #ibt-step-3 {
  animation: fadeIn 0.3s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

#ibt-step-2 h3, #ibt-step-3 h3 {
  margin-top: 0;
  margin-bottom: 1rem;
  color: var(--primary-text);
  font-size: 1.3rem;
}

/* ---------------- Summary ---------------- */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.summary-item {
  background: var(--form-bg);
  padding: 12px;
  border-radius: 8px;
  border-left: 4px solid var(--button-bg);
}

.summary-item strong {
  display: block;
  margin-bottom: 4px;
  color: var(--secondary-text);
  font-size: 0.9rem;
}

.summary-item span {
  color: var(--primary-text);
  font-size: 1rem;
}

/* ---------------- Add Line Button ---------------- */
#add-line-btn {
    background: #28a745;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s, transform 0.1s;
    margin: 20px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
}

#add-line-btn:hover {
    background: #218838;
    transform: translateY(-1px);
}

#add-line-btn:active {
    transform: translateY(0);
}

/* ---------------- Compact Summary Styles ---------------- */
.compact-summary {
    background: var(--form-bg);
    border-radius: 8px;
    padding: 0;
    margin: 15px 0;
    border: 1px solid var(--input-border);
}

.compact-header {
    background: var(--button-bg);
    color: var(--button-text);
    padding: 12px 15px;
    margin: 0;
    border-radius: 8px 8px 0 0;
    font-size: 1rem;
    font-weight: 600;
}

/* Horizontal 2-column layouts */
.compact-grid-tight {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px 20px;
}

.compact-item-tight {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.compact-item-tight strong {
    font-size: 0.8rem;
    color: var(--secondary-text);
    font-weight: 600;
}

.compact-item-tight span {
    font-size: 0.9rem;
    color: var(--primary-text);
    font-weight: 500;
}

.compact-grid-inline {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px 15px;
}

.compact-item-inline {
    display: flex;
    align-items: center;
    gap: 8px;
}

.compact-item-inline strong {
    font-size: 0.8rem;
    color: var(--secondary-text);
    min-width: 85px;
    flex-shrink: 0;
}

.compact-item-inline span {
    font-size: 0.9rem;
    color: var(--primary-text);
    font-weight: 500;
    flex: 1;
}

/* ---------------- Compact Product Lines ---------------- */
.compact-products {
    margin: 20px 0;
}

.compact-product-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 15px;
    border-bottom: 1px solid var(--input-border);
    background: var(--form-bg);
}

.compact-product-item:last-child {
    border-bottom: none;
    border-radius: 0 0 8px 8px;
}

.compact-product-item:nth-child(even) {
    background: #f8f9fa;
}

.product-details {
    flex: 1;
}

.product-name {
    font-weight: 600;
    color: var(--primary-text);
    margin-bottom: 4px;
    font-size: 0.95rem;
}

.product-meta {
    font-size: 0.8rem;
    color: var(--secondary-text);
}

.product-qty {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: 15px;
}

.qty-badge {
    background: var(--button-bg);
    color: var(--button-text);
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.9rem;
    min-width: 60px;
    text-align: center;
}

/* ---------------- Step 2 Line Improvements ---------------- */
.ibt-line {
    background: #f8f9fa;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border-left: 4px solid #3498db;
    position: relative;
}

.ibt-line-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Remove button styling */
.ibt-remove-btn {
    margin-top: 10px;       /* space from the row above */
    align-self: flex-start;  /* aligns vertically with the line container */
    padding: 4px 8px;
    font-size: 0.85rem;
    line-height: 1;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
}

.ibt-remove-btn:hover {
    background: #c0392b;
    color: white;
}

.ibt-line {
    display: flex;
    flex-direction: column; /* row + button below */
    gap: 6px;
}

/* ---------------- Button Groups ---------------- */
.button-group {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.button-group button {
    flex: 1;
}

/* ---------------- Select2 Custom ---------------- */
.select2-container--default .select2-selection--single {
  border: 1px solid var(--input-border);
  border-radius: 8px;
  height: auto;
  padding: 12px 14px;
  background: var(--form-bg);
}

.select2-container--default .select2-selection--single .select2-selection__rendered {
  padding-left: 0;
  color: var(--primary-text);
  line-height: 1.5;
}

.select2-container--default .select2-selection--single .select2-selection__arrow {
  height: 100%;
}

.select2-container--default .select2-results__option--highlighted[aria-selected] {
  background-color: var(--button-bg);
}

/* ---------------- Responsive ---------------- */
@media (max-width: 768px) {
  .wrap { padding: 1rem; }
  .card { padding: 1rem; }
  header h1 { font-size: 1.5rem; }

  .summary-grid, 
  .compact-grid-tight,
  .compact-grid-inline { 
    grid-template-columns: 1fr; 
  }

  .ibt-line-row {
    flex-direction: column;
    align-items: flex-start;
  }

  .qty-input,
  .stock-unit {
    margin-left: 0;
  }
  
  .compact-product-item {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
  
  .product-qty {
    margin-left: 0;
    align-self: flex-end;
  }
  
  .ibt-line-row {
    flex-wrap: wrap;
  }
  
  .remove-line-btn {
    position: absolute;
    top: 8px;
    right: 8px;
  }
}

@media (max-width: 480px) {
  .wrap { padding: 0.75rem; }
  .card { padding: 0.75rem; }
  header h1 { font-size: 1.3rem; }

  input[list], input[type="number"] {
    font-size: 0.95rem;
    padding: 10px 12px;
  }
  
  .button-group {
    flex-direction: column;
  }
}
  </style>
</head>

<body>
{% include 'inventory-taskbar.html' %}

<div class="page-content with-fixed-taskbar">
  <div class="wrap">
    <div class="card">

      <header><h1>Create IBT</h1></header>

      <form id="ibtForm">

        <!-- STEP 1 — HEADER -->
        <section id="ibt-step-1">
          <label>Warehouse From</label>
          <select id="wh-from"></select>

          <label>Warehouse To</label>
          <select id="wh-to"></select>

          <label>Requested By</label>
          <input type="text" id="requested-by" placeholder="Requested by">

          <label>Dispatcher</label>
          <input type="text" id="dispatcher" placeholder="Dispatcher name">

          <label>Driver</label>
          <input type="text" id="driver" placeholder="Driver name">

          <button type="button" id="ibt-step-1-next" class="btn-primary">Next: Select Products</button>
        </section>

        <!-- STEP 2 — LINES -->
        <div id="ibt-step-2" class="hidden">
            <h3>Step 2 – Select Products</h3>

            <!-- Product Lines Container -->
            <div id="ibt-lines-container"></div>

            <button id="add-line-btn" type="button">
                <span>➕</span>
                Add Product Line
            </button>

            <div class="button-group">
                <button id="step-2-back-btn" type="button" class="btn-secondary">← Back</button>
                <button id="step-2-next-btn" type="button" class="btn-primary">Review →</button>
            </div>
        </div>

        <!-- STEP 3 — SUMMARY -->
        <section id="ibt-step-3" class="hidden">
            <h3>Review IBT</h3>
            <div id="ibt-summary"></div>
            
            <div class="button-group">
                <button id="step-3-back-btn" type="button" class="btn-secondary">← Back to Products</button>
                <button type="button" id="ibt-submit" class="btn-primary">Submit IBT</button>
            </div>
        </section>

      </form>
    </div>
  </div>
</div>
<!-- Select2 CSS & JS -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="{{ url_for('inventory.static', filename='EvolutionSDK/IBT.js') }}?{{ filemtime('inventory', 'EvolutionSDK/IBT.js') }}"></script>
</body>
</html>
