{% extends 'inventory_base.html' %}
{% block content %}
  <style>
    /* ==== COMPACT LAYOUT ==== */
    * { box-sizing: border-box; }
    body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--primary-bg); color:var(--primary-text); font-size:0.9rem; }
    .wrap { max-width:1100px; margin:0 auto; padding:0.75rem; }
    .wrap.with-fixed-taskbar { padding-top:1rem; margin-top:60px; }
    .card { background:var(--container-bg); border-radius:8px; padding:0.75rem; margin-bottom:0.75rem; box-shadow:0 1px 6px rgba(0,0,0,.08); }
    header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; }
    header h1 { margin:0; font-size:1.4rem; }
    .btn-primary, .btn-secondary, .btn-danger {
      padding:6px 12px; border-radius:6px; font-size:0.85rem; font-weight:500; cursor:pointer; text-decoration:none; display:inline-block;
    }
    .btn-primary { background:var(--button-bg); color:var(--button-text); border:none; }
    .btn-secondary { background:#6c757d; color:#fff; }
    .btn-danger { background:#e74c3c; color:#fff; }
    .btn-primary:hover { background:var(--button-hover); }
    .btn-secondary:hover { background:#5a6268; }
    .btn-danger:hover { background:#c0392b; }

    /* ==== IBT LIST ==== */
    .ibt-list { display:grid; gap:8px; }
    .ibt-item {
      background:var(--form-bg); padding:10px; border-radius:6px; border-left:3px solid var(--button-bg); cursor:pointer;
      transition:transform .15s,box-shadow .15s;
    }
    .ibt-item:hover { transform:translateY(-1px); box-shadow:0 3px 8px rgba(0,0,0,.1); }
    .ibt-number { font-weight:600; font-size:1rem; margin-bottom:2px; }
    .ibt-description { font-size:0.85rem; color:var(--secondary-text); margin-bottom:4px; }
    .ibt-details { display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size:0.8rem; color:#666; }

    /* ==== IBT DETAIL ==== */
    .ibt-detail-header { background:var(--form-bg); padding:10px; border-radius:6px; margin-bottom:8px; border-left:3px solid var(--button-bg); }
    .ibt-detail-header h2 { margin:0 0 4px; font-size:1.1rem; }
    .ibt-detail-header p { margin:0; font-size:0.8rem; color:#666; }
    .ibt-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
    .ibt-detail-item { background:var(--container-bg); padding:8px; border-radius:5px; font-size:0.85rem; }
    .ibt-detail-item strong { display:block; margin-bottom:2px; color:var(--secondary-text); font-size:0.8rem; }

    /* ==== PRODUCT LINES ==== */
    .product-lines { margin-top:12px; }
    .product-line { background:var(--form-bg); padding:10px; border-radius:6px; margin-bottom:8px; border-left:3px solid #3498db; }
    .product-line-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; gap:8px; }
    .product-info { flex:1; }
    .product-id { font-weight:600; font-size:0.95rem; margin-bottom:2px; }
    .product-desc { font-size:0.8rem; color:var(--secondary-text); margin-bottom:2px; }
    .line-reference { font-size:0.75rem; color:#888; font-style:italic; }
    .qty-issued { background:#e8f4fd; padding:4px 8px; border-radius:5px; font-weight:600; font-size:0.8rem; min-width:70px; text-align:center; }

    /* ==== QUANTITY INPUTS ==== */
    .quantity-inputs { display:grid; grid-template-columns:1fr; gap:10px; margin-top:8px; }
    .quantity-group { display:flex; flex-direction:column; gap:6px; }
    .quantity-group label { font-size:0.85rem; margin-bottom:3px; font-weight:600; color:var(--secondary-text); }
    .quantity-input {
      padding:10px 12px; border:1px solid var(--input-border); border-radius:8px; background:var(--form-bg); font-size:0.95rem;
    }
    .quantity-input:focus { outline:none; border-color:var(--input-focus); box-shadow:0 0 0 2px var(--input-shadow); }
    .quantity-status { display:flex; justify-content:space-between; gap:10px; align-items:center; background:#f8f9fa; padding:10px 12px; border-radius:8px; font-size:0.85rem; color:var(--secondary-text); }
    .quantity-status strong { font-weight:700; color:var(--primary-text); }
    .quantity-total { background:transparent; padding:0; border-radius:0; text-align:left; font-size:0.9rem; font-weight:600; margin-top:0; }
    .quantity-error { color:#e74c3c; font-size:0.8rem; margin-top:2px; display:none; }
    .unit-toggle { margin-top:16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .toggle-option { display:inline-flex; position:relative; }
    .toggle-option input { position:absolute; opacity:0; pointer-events:none; }
    .toggle-option label { display:inline-flex; align-items:center; justify-content:center; min-width:110px; height:36px; padding:0 14px; border-radius:999px; background:#eef3fb; color:#334155; font-size:0.86rem; cursor:pointer; transition: background .2s, color .2s, transform .15s; border:1px solid transparent; }
    .toggle-option input:checked + label { background:var(--button-bg); color:var(--button-text); border-color: rgba(0,0,0,0.08); }
    .toggle-option label:hover { transform: translateY(-1px); }
    .unit-toggle span { color:var(--secondary-text); font-size:0.85rem; }
    .qty-issued { display:inline-flex; align-items:center; gap:6px; background:#e8f4fd; padding:4px 8px; border-radius:5px; font-weight:600; font-size:0.8rem; min-width:70px; text-align:center; }
    .qty-issued span { color:var(--secondary-text); font-size:0.8rem; font-weight:500; }

    /* ==== ACTION BUTTONS ==== */
    .acceptance-row {
      margin-top:16px;
      display:flex;
      gap:12px;
      align-items:flex-end;
      flex-wrap:wrap;
    }
    .acceptance-row .input-group {
      flex:1;
      min-width:220px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .acceptance-row label {
      font-size:0.8rem;
      font-weight:600;
      color:var(--secondary-text);
    }
    .acceptance-row input {
      padding:8px 10px;
      border:1px solid var(--input-border);
      border-radius:6px;
      background:var(--form-bg);
      font-size:0.9rem;
    }
    .action-buttons { display:flex; gap:8px; justify-content:flex-end; }
    @media (max-width:768px) {
      .ibt-detail-grid, .quantity-inputs { grid-template-columns:1fr; }
      .action-buttons { width:100%; justify-content:stretch; }
      .action-buttons button { width:100%; }
      .product-line-header { flex-direction:column; gap:6px; }
    }
    .hidden { display:none; }
    .loading, .empty-state { text-align:center; padding:20px; color:var(--secondary-text); font-size:0.9rem; }
    .empty-state h3 { margin-bottom:4px; color:var(--primary-text); }
  </style>

<div class="page-content">
  <div class="wrap">

    <!-- IBT LIST -->
    <div class="card" id="ibt-list-view">
      <header><h1>Receive IBT</h1></header>
      <div id="ibt-list-container"><div class="loading">Loading IBTs...</div></div>
    </div>

    <!-- IBT DETAIL -->
    <div class="card hidden" id="ibt-detail-view">
      <header>
        <div>
          <h1 id="detail-view-title">IBT Details</h1>
        </div>
        <button type="button" id="back-to-list" class="btn-secondary">Back</button>
      </header>
      <div id="ibt-detail-container"><div class="loading">Loading details...</div></div>
      <div class="acceptance-row">
        <div class="action-buttons">
          <button type="button" id="submit-receipt" class="btn-primary">Submit Receipt</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    let currentIbt = null;
    let currentUnitMode = 'stocking';

    await loadIbtList();

    const initialIbt = new URLSearchParams(window.location.search).get('ibt_id') || new URLSearchParams(window.location.search).get('ibt_number');
    if (initialIbt) {
        loadIbtDetail(initialIbt);
    }

    document.getElementById("back-to-list").addEventListener("click", async () => {
        document.getElementById("ibt-detail-view").classList.add("hidden");
        document.getElementById("ibt-list-view").classList.remove("hidden");
        history.replaceState(null, "", window.location.pathname);
        await loadIbtList();
    });

    document.getElementById("submit-receipt").addEventListener("click", submitReceipt);
});

async function loadIbtList() {
    const container = document.getElementById("ibt-list-container");
    container.innerHTML = '<div class="loading">Loading IBTs...</div>';

    try {
        const res = await fetch("/inventory/fetch_issued_ibts");
        const { ibts } = await res.json();
        displayIbtList(ibts);
    } catch (err) {
        container.innerHTML = `<div class="empty-state"><h3>Error</h3><p>Failed to load IBTs.</p></div>`;
    }
}

    function displayIbtList(ibts) {
        const container = document.getElementById("ibt-list-container");
        if (!ibts?.length) {
            container.innerHTML = `<div class="empty-state"><h3>No IBTs</h3><p>No issued IBTs to receive.</p></div>`;
            return;
        }
        let html = '<div class="ibt-list">';
        ibts.forEach((ibt) => {
            html += `
                <div class="ibt-item" data-ibt-id="${ibt.ibt_id || ibt.ibt_number}" data-ibt-number="${ibt.ibt_number}">
                    <div class="ibt-number">${ibt.ibt_number}</div>
                    <div class="ibt-description">${ibt.description || '—'}</div>
                    <div class="ibt-details">
                        <div><strong>From:</strong> ${ibt.warehouse_from}</div>
                        <div><strong>To:</strong> ${ibt.warehouse_to}</div>
                    </div>
                </div>`;
        });
        html += '</div>';
        container.innerHTML = html;

        container.querySelectorAll('.ibt-item').forEach(el => {
            el.addEventListener('click', function() {
                const ibtId = this.getAttribute('data-ibt-id') || this.getAttribute('data-ibt-number');
                loadIbtDetail(ibtId);
            });
        });
    }

    async function loadIbtDetail(ibt_id) {
        currentIbt = ibt_id;
        document.getElementById("ibt-list-view").classList.add("hidden");
        document.getElementById("ibt-detail-view").classList.remove("hidden");
        const container = document.getElementById("ibt-detail-container");
        container.innerHTML = '<div class="loading">Loading...</div>';

        try {
            const res = await fetch(`/inventory/display_ibt?ibt_id=${encodeURIComponent(ibt_id)}`);
            const { ibt_details } = await res.json();
            displayIbtDetail(ibt_details);
            setupUnitToggle();
            history.replaceState(null, "", `?ibt_id=${encodeURIComponent(ibt_id)}`);
        } catch (err) {
            container.innerHTML = `<div class="empty-state"><h3>Error</h3><p>Failed to load details.</p></div>`;
        }
    }

    function displayIbtDetail(lines) {
        if (!lines?.length) {
            document.getElementById("ibt-detail-container").innerHTML = `<div class="empty-state"><h3>No Lines</h3><p>No product lines found.</p></div>`;
            return;
        }
        const first = lines[0];
        let html = `
            <div class="ibt-detail-grid">
                <div class="ibt-detail-item"><strong>From</strong><span>${first.warehouse_from}</span></div>
                <div class="ibt-detail-item"><strong>To</strong><span>${first.warehouse_to}</span></div>
            </div>
            <div class="unit-toggle">
                <div class="toggle-option">
                    <input type="radio" id="unit_mode_stocking" name="unit_mode" value="stocking" checked>
                    <label for="unit_mode_stocking">Stocking Units</label>
                </div>
                <div class="toggle-option">
                    <input type="radio" id="unit_mode_purchasing" name="unit_mode" value="purchasing">
                    <label for="unit_mode_purchasing">Purchasing Units</label>
                </div>
            </div>
            <h3 style="margin:12px 0 8px;font-size:1rem;">Product Lines</h3>
            <div class="product-lines" id="product-lines-container">`;

        lines.forEach((line, i) => {
            html += `
                <div class="product-line" data-line="${i}" data-ibt-line-id="${line.ibt_line_id}" data-product-id="${line.product_id}" data-conversion-factor="${line.conversion_factor || 1}" data-purchasing-unit-code="${line.purchasing_unit_code || ''}" data-stocking-unit-code="${line.stocking_unit_code || ''}" data-issued-stocking="${line.qty_issued}">
                    <div class="product-line-header">
                        <div class="product-info">
                            <div class="product-desc">${line.product_desc}</div>
                            <div class="line-reference" style="font-size:0.75rem;color:#888;margin-top:4px;">${line.reference || ''}</div>
                        </div>
                        <div class="qty-issued"><span>Issued</span>${Math.round(line.qty_issued / line.conversion_factor)} ${line.purchasing_unit_code || ''} / ${line.qty_issued } ${line.stocking_unit_code || ''}</div>
                    </div>
                    <div class="quantity-inputs">
                        <div class="quantity-group">
                            <label id="received-label-${i}">Received (${line.stocking_unit_code || ''})</label>
                            <input type="number" class="quantity-input qty-received" data-line="${i}" min="0" step="0.01" value="0" oninput="updateQty(${i})">
                        </div>
                        <div class="quantity-status">
                            <span id="variance-label-${i}">Variance: 0 ${line.stocking_unit_code || ''}</span>
                            <span id="mode-label-${i}">In stocking units</span>
                        </div>
                    </div>
                </div>`;
        });
        html += `</div>`;
        document.getElementById("ibt-detail-container").innerHTML = html;
        document.getElementById("detail-view-title").textContent = `IBT: ${first.ibt_number}`;
    }

    function setupUnitToggle() {
        const radios = document.querySelectorAll('input[name="unit_mode"]');
        radios.forEach(radio => {
            radio.addEventListener('change', (event) => {
                currentUnitMode = event.target.value;
                document.querySelectorAll('.product-line').forEach(line => {
                    // preserve previous input values where possible
                    const i = line.dataset.line;
                    const input = document.querySelector(`.qty-received[data-line="${i}"]`);
                    if (input) input.dataset.prev = input.value;
                    updateQty(i);
                });
            });
        });

        // attach smarter input handlers that keep previous valid value
        document.querySelectorAll('.qty-received').forEach(input => {
            // store previous valid value to revert when invalid char typed
            input.dataset.prev = input.value || '';

            input.addEventListener('input', (e) => {
                const i = input.dataset.line;
                const lineEl = document.querySelector(`.product-line[data-line="${i}"]`);
                if (!lineEl) return;
                const issuedStocking = Number(lineEl.dataset.issuedStocking) || 0;
                const conversionFactor = Number(lineEl.dataset.conversionFactor) || 1;
                const issuedPurchasing = Number(lineEl.dataset.issuedStocking / conversionFactor) || 0;
                const expectedStock = Math.round(issuedStocking);
                const maxAllowed = (currentUnitMode === 'stocking') ? expectedStock : issuedPurchasing;

                const raw = input.value;

                // allow empty or single dot while typing (partial decimal)
                if (raw === '' || raw === '.' || raw === '-' ) {
                    input.dataset.prev = raw;
                    updateQty(i);
                    return;
                }

                // parse float from the raw input
                const parsed = parseFloat(raw);
                if (isNaN(parsed)) {
                    // non-numeric character typed - revert to previous and refresh
                    input.value = input.dataset.prev || '';
                    updateQty(i);
                    return;
                }

                // negative not allowed
                if (parsed < 0) {
                    input.value = '0';
                    input.dataset.prev = '0';
                    updateQty(i);
                    return;
                }

                // if parsed value exceeds max, revert to previous (do not clamp)
                if (parsed > maxAllowed) {
                    // revert the last change (don't clamp) and refresh calculations
                    input.value = input.dataset.prev || '';
                    updateQty(i);
                    return;
                }

                // valid value - store as previous and update
                input.dataset.prev = input.value;
                updateQty(i);
            });
        });

        currentUnitMode = document.querySelector('input[name="unit_mode"]:checked')?.value || 'stocking';
        document.querySelectorAll('.product-line').forEach(line => updateQty(line.dataset.line));
    }

    window.updateQty = function(i) {
        const lineEl = document.querySelector(`.product-line[data-line="${i}"]`);
        const receivedInput = document.querySelector(`.qty-received[data-line="${i}"]`);
        if (!lineEl || !receivedInput) return;
        const issuedStocking = Number(lineEl.dataset.issuedStocking) || 0;
        const conversionFactor = Number(lineEl.dataset.conversionFactor) || 1;
        const issuedPurchasing = Math.round(issuedStocking / conversionFactor);
        const raw = receivedInput.value;
        const receivedNum = isNaN(parseFloat(raw)) ? 0 : parseFloat(raw);
        const receivedLabel = document.getElementById(`received-label-${i}`);
        const varianceLabel = document.getElementById(`variance-label-${i}`);
        const modeLabel = document.getElementById(`mode-label-${i}`);

        let variance = 0;
        let unitCode = lineEl.dataset.stockingUnitCode || '';
        let maxAllowed = 0;

        if (currentUnitMode === 'stocking') {
            maxAllowed = issuedStocking;
            unitCode = lineEl.dataset.stockingUnitCode || '';
            receivedLabel.textContent = `Received (${unitCode})`;
            modeLabel.textContent = `Mode: Stocking Units`;
        } else {
            maxAllowed = issuedPurchasing;
            unitCode = lineEl.dataset.purchasingUnitCode || '';
            receivedLabel.textContent = `Received (${unitCode})`;
            modeLabel.textContent = `Mode: Purchasing Units`;
        }

        // Only use numeric value for calculations; do not overwrite user's partial input
        const usedReceived = Math.min(Math.max(receivedNum || 0, 0), maxAllowed);

        // Recalculate variance using usedReceived
        if (currentUnitMode === 'stocking') {
            variance = Math.round((issuedStocking - usedReceived) * 100) / 100;
        } else {
            variance = Math.round((issuedPurchasing - usedReceived) * 100) / 100;
        }

        // Ensure input max attribute is correct for native UI
        receivedInput.max = maxAllowed;

        varianceLabel.textContent = `Variance: ${variance.toLocaleString(undefined, {maximumFractionDigits:2})} ${unitCode}`;
    };

    async function submitReceipt() {
        const lines = document.querySelectorAll('.product-line');
        const payload = { ibt_id: currentIbt, ibt_number: currentIbt, lines: [] };
        const varianceLines = [];

        lines.forEach(line => {
            const i = line.dataset.line;
            const productCode = line.dataset.productId;
            const productDesc = line.querySelector('.product-desc').textContent.trim();
            const issuedStocking = Number(line.dataset.issuedStocking) || 0;
            const conversionFactor = Number(line.dataset.conversionFactor) || 1;
            const received = Number(document.querySelector(`.qty-received[data-line="${i}"]`).value) || 0;
            let qtyReceived = received;
            let qtyVariance = 0;
            let displayIssued = 0;
            let displayReceived = 0;
            let displayVariance = 0;
            let unitCode = '';

            const issuedPurchasing = Math.round(issuedStocking / conversionFactor);
            if (currentUnitMode === 'stocking') {
                // Already in stocking units, submit directly
                qtyReceived = received;
                qtyVariance = Math.round(issuedStocking - received);
                displayIssued = issuedStocking;
                displayReceived = received;
                displayVariance = qtyVariance;
                unitCode = line.dataset.stockingUnitCode || '';
            } else {
                // Convert purchasing units to stocking units for backend submission
                qtyReceived = Math.round((received * conversionFactor) * 100) / 100;
                qtyVariance = Math.round((issuedStocking - qtyReceived) * 100) / 100;
                displayIssued = issuedStocking;
                displayReceived = received;
                displayVariance = Math.round((issuedPurchasing - received) * 100) / 100;
                unitCode = line.dataset.purchasingUnitCode || '';
            }

            // Track lines with variance
            if (qtyVariance !== 0) {
                varianceLines.push({
                    productDesc,
                    issued: displayIssued,
                    received: displayReceived,
                    variance: displayVariance,
                    unit: unitCode
                });
            }

            payload.lines.push({
                ibt_line_id: line.dataset.ibtLineId,
                InventoryItemID: productCode,
                QuantityReceived: qtyReceived,
                QuantityDamaged: 0,
                QuantityVariance: qtyVariance,
                Description: document.querySelector(`.product-line[data-line="${i}"] .line-reference`).textContent.trim() || "",
                Reference: productCode
            });
        });

        // Show variance warning if any exist
        if (varianceLines.length > 0) {
            let varianceHtml = '<div style="text-align:left; max-height:300px; overflow-y:auto;">';
            varianceHtml += '<p style="margin-bottom:12px;"><strong>The following products have variances:</strong></p>';
            varianceHtml += '<ul style="margin:0; padding-left:20px;">';
            varianceLines.forEach(line => {
                varianceHtml += `<li style="margin-bottom:6px;"><strong>${line.productDesc}</strong><br/>Issued: ${line.issued} ${line.unit} | Received: ${line.received} ${line.unit} | Variance: ${line.variance} ${line.unit}</li>`;
            });
            varianceHtml += '</ul></div>';

            const result = await Swal.fire({
                title: "Variance Warning",
                html: varianceHtml,
                icon: "warning",
                showCancelButton: true,
                confirmButtonText: "Continue Anyway",
                cancelButtonText: "Cancel",
                allowOutsideClick: false,
                allowEscapeKey: false
            });

            if (!result.isConfirmed) {
                return;
            }
        }

        // Proceed with submission
        try {
            const res = await fetch("/inventory/submit_ibt_receive", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (result.success) {
                Swal.fire("Success", result.message, "success").then(() => {
                    document.getElementById("ibt-detail-view").classList.add("hidden");
                    document.getElementById("ibt-list-view").classList.remove("hidden");
                    loadIbtList();
                });
            } else {
                Swal.fire("Failed", result.message || "Unknown error", "error");
            }
        } catch (err) {
            Swal.fire("Error", "Submission failed", "error");
        }
    }
</script>
{% endblock %}
