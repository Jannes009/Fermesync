{% extends 'inventory_base.html' %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('market.static', filename='color-template.css') }}">
<!-- Select2 CSS -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<!-- SweetAlert2 CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
<style>
  :root{
    --card-bg: var(--container-bg);
    --muted: var(--secondary-text);
    --accent: #2563eb;
    --danger: #dc2626;
  }
  .page-wrap{ padding:1.5rem; max-width:1100px; margin:0 auto; }
  .po-card{
    background:var(--card-bg);
    border-radius:12px;
    box-shadow:0 6px 20px rgba(20,30,50,0.06);
    padding:1.25rem;
  }
  .header{ display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1rem; }
  .title{ font-size:1.15rem; font-weight:700; color:var(--primary-text); }
  .muted{ color:var(--muted); font-size:0.95rem; }

  label{ font-size:0.9rem; color:var(--muted); margin-bottom:0.25rem; display:block; }
  input[type="text"], input[type="date"], input[type="number"], select, textarea{
    width:100%; padding:0.5rem 0.6rem; border-radius:8px; border:1px solid rgba(0,0,0,0.08);
    background:var(--form-bg, #fff); color:var(--primary-text); box-sizing:border-box;
  }

  .lines{ margin-top:0.5rem; display:flex; flex-direction:column; gap:0.75rem; }

  /* Product row styling (match IBT issue) */
  .product-row {
    display: grid;
    grid-template-columns: 1fr 90px 80px 40px;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--form-bg);
    border: 1px solid var(--input-border);
    border-radius: 6px;
    margin-bottom: 6px;
    transition: all 0.15s ease;
    min-height: 44px;
  }
  @media (max-width: 480px) {
    .product-row { grid-template-columns: 1fr 70px 60px 36px; gap:6px; padding:6px 8px; }
  }

  .product-select { width:100% !important; padding:8px 10px !important; font-size:0.95rem !important; border-radius:5px !important; }
  .qty-input {
    height:36px; font-size:1rem; font-weight:600; text-align:center;
    border:1px solid var(--input-border); border-radius:6px; padding:4px;
  }
  .uom-label {
    background:#f0f2f5; padding:6px 8px; border-radius:6px; font-size:0.85rem; text-align:center;
    min-height:36px; display:flex; align-items:center; justify-content:center; color:var(--primary-text);
  }
  .ibt-remove-btn {
    width:36px; height:36px; border:none; border-radius:5px; background:#dc3545; color:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }

  .scouts{ display:flex; flex-direction:column; gap:0.5rem; margin-top:0.5rem; }
  .scout-row{ display:flex; gap:0.5rem; align-items:flex-start; }
  .scout-row select{ flex:0 0 240px; max-width:40%; }
  .scout-row textarea{ flex:1; min-height:40px; }
  .controls{ display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; margin-top:0.75rem; }
  .btn{ padding:0.5rem 0.75rem; border-radius:8px; border:none; cursor:pointer; background:var(--accent); color:#fff; }
  .btn.ghost{ background:transparent; color:var(--accent); border:1px solid rgba(37,99,235,0.12); }
  .btn.danger{ background:var(--danger); }
  .small{ padding:0.35rem 0.5rem; font-size:0.9rem; border-radius:6px; }

  /* select2 fixes */
  .select2-container { width:100% !important; }
  .select2-container--default .select2-selection--single {
    border-radius:6px; height:36px; padding:2px 6px;
  }
  .select2-container--default .select2-selection--single .select2-selection__rendered {
    line-height:32px;
  }
</style>

<div class="page-wrap">
  <div class="po-card">
    <div class="header">
      <div>
        <div class="title">Create Spray Recommendation</div>
        <div class="muted">Add header and product lines for the recommendation</div>
      </div>
    </div>

    <form method="post" id="spray-form">
      <section style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div>
          <label for="spray_date">Date</label>
          <input id="spray_date" type="date" name="spray_date" required>
        </div>
        <div>
          <label for="bhs_id">Block Harvest Season</label>
          <select id="bhs_id" name="bhs_id" class="select2" required>
            {% for bhs in bhs_list %}
            <option value="{{ bhs.IdBHS }}">
              {{ bhs.BlockCode }} - {{ bhs.CropCode }} - {{ bhs.BHSPlantDate }}
            </option>
            {% endfor %}
          </select>
        </div>
      </section>
        <section style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
  <div>
    <label>Spray Method</label>
    <select id="method_id" class="select2" required>
      <option value="">-- select method --</option>
      {% for m in methods %}
        <option value="{{ m.IdSprayMethod }}" {% if loop.first %}selected{% endif %}>
          {{ m.SprayMethodName }}
        </option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label>Warehouse</label>
    <select id="warehouse_id" class="select2" required>
      <option value="">-- select warehouse --</option>
      {% for w in warehouses %}
        <option value="{{ w.WhseLink }}">
          {{ w.WhseDescription }}
        </option>
      {% endfor %}
    </select>
  </div>
</section>

      <hr style="border:none;border-top:1px solid rgba(0,0,0,0.06); margin:0.75rem 0;">

      <section>
        <h3 style="margin:0 0 0.5rem 0; font-size:1rem;">Spray Lines</h3>
        <div class="lines" id="lines"></div>

        <div class="controls">
          <button type="button" class="btn" onclick="addLine()">Add Product</button>
          <button type="button" class="btn ghost small" onclick="clearLines()">Clear Lines</button>
        </div>
      </section>

      <hr style="border:none;border-top:1px solid rgba(0,0,0,0.06); margin:0.75rem 0;">
      <div style="display:flex; justify-content:flex-end; gap:0.5rem;">
        <button type="submit" class="btn">Save Recommendation</button>
      </div>
    </form>
  </div>
<hr>
<h3 style="margin-top:1rem;">Mix Preview</h3>
<div id="mix-preview"></div>

</div>

<!-- jQuery + Select2 -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
/* product options include data-uom attribute for display-only UoM */
const PRODUCT_OPTIONS = `
  {% for c in chem_stock %}
  <option value="{{ c.IdChemStock }}" stock-description="{{ c.StockDescription }}" data-uom="{{ (c.StockingUnitCode if c.StockingUnitCode is defined else '') | e }}">{{ c.StockDescription }}-{{ c.ChemStockActiveIngr }}{% if c.ChemTypeName %} ({{ c.ChemTypeName }}){% endif %}</option>
  {% endfor %}
`;

const SCOUT_OPTIONS = `
  <option value="">-- select scout issue --</option>
  {% for s in scouts %}
  <option value="{{ s.IdScoutMstr }}">{{ s.ScoutMstrName }}</option>
  {% endfor %}
`;

/* initialize select2 within root element (or whole document) */
function initSelect2(root){
  const $root = root ? $(root) : $(document);
  $root.find('select.select2, select.product-select, select.scout-select').each(function(){
    if (!$(this).hasClass('select2-hidden-accessible')) {
      $(this).select2({ width: 'resolve', placeholder: $(this).find('option:first').text() || '' });
      
      // Auto-focus search when dropdown opens
      $(this).on('select2:open', function() {
        setTimeout(() => {
          document.querySelector('.select2-container--open .select2-search__field')?.focus();
        }, 0);
      });
    }
  });
}

/* update UoM label next to qty when product changes */
$(document).on('change', '.product-select', function(){
  const uom = $(this).find('option:selected').data('uom') || '';
  const row = $(this).closest('.product-row');
  row.find('.uom-label').text(uom || '');
});

/* add/remove lines */
let lineIndex = 0;
function addLine(){
  const idx = lineIndex++;
  const container = document.createElement('div');
  container.className = 'product-row';
  container.dataset.index = idx;
  container.innerHTML = `
    <div class="product-select-wrapper">
      <label class="sr-only">Product</label>
      <select name="product_${idx}" class="product-select select2">${PRODUCT_OPTIONS}</select>
    </div>
    <div>
      <label class="sr-only">Qty(per HA)</label>
      <input type="number" step="0.01" name="qty_${idx}" class="qty-input" placeholder="Qty" required>
    </div>
    <div>
      <label class="sr-only">UoM</label>
      <div class="uom-label"></div>
    </div>
    <div>
      <button type="button" class="ibt-remove-btn" onclick="removeLine(this)">✕</button>
    </div>

    <div class="scouts" id="scouts_${idx}">
      <div style="display:flex;justify-content:flex-end;margin-top:6px;">
        <button type="button" class="btn ghost small" onclick="addScout(${idx})">Add Scout</button>
      </div>
    </div>

    <input type="hidden" name="line_index[]" value="${idx}">
  `;
  document.getElementById('lines').appendChild(container);
  initSelect2(container);
  // trigger change to set initial UoM
  $(container).find('.product-select').trigger('change');
}

function removeLine(btn){
  const row = btn.closest('.product-row');
  if(row) row.remove();
}

/* scouting rows (as before) */
function addScout(lineIdx){
  const container = document.getElementById(`scouts_${lineIdx}`);
  if(!container) return;
  const row = document.createElement('div');
  row.className = 'scout-row';
  row.innerHTML = `
    <select name="scout_${lineIdx}_id[]" class="select2 scout-select">${SCOUT_OPTIONS}</select>
    <button type="button" class="btn danger small" onclick="removeScout(this)">Remove</button>
  `;
  container.appendChild(row);
  initSelect2(row);
}

function removeScout(btn){
  const row = btn.closest('.scout-row');
  if(row) row.remove();
}

function clearLines(){
  document.getElementById('lines').innerHTML = '';
  lineIndex = 0;
}

document.addEventListener('DOMContentLoaded', function(){
  initSelect2();
  addLine();
});
</script>
<script>

function collectFormData() {

    const bhs_id = document.getElementById("bhs_id").value;
    const method_id = document.getElementById("method_id").value;

    const lines = [];

    document.querySelectorAll(".product-row").forEach(row => {

        const productId = row.querySelector(".product-select").value;
        const productDescription = row.querySelector(".product-select option:checked").getAttribute("stock-description") || '';
        const uom = row.querySelector(".product-select option:checked").dataset.uom || '';
        const qty = row.querySelector(".qty-input").value;

        if (productId && qty && parseFloat(qty) > 0) {
            lines.push({
                stock_id: productId,
                stock_description: productDescription,
                uom: uom,
                qty_per_ha: qty
            });
        }
    });

    return {
        bhs_id: bhs_id,
        method_id: method_id,
        lines: lines
    };
}

function fetchPreview() {

    const data = collectFormData();

    if (!data.bhs_id || !data.method_id || data.lines.length === 0) {
        document.getElementById("mix-preview").innerHTML = "";
        return;
    }

    fetch("/agri/spray-recommendation/preview", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => renderPreview(data));
}

function renderPreview(data) {

    if (!data.mixes || data.mixes.length === 0) {
        document.getElementById("mix-preview").innerHTML = "";
        return;
    }

    let html = `
        <div style="margin-bottom:8px;">
            Total Ha: <strong>${data.total_ha}</strong> |
            Total Water: <strong>${data.total_water} L</strong> |
            Mixes: <strong>${data.number_of_mixes}</strong>
        </div>
    `;

    data.mixes.forEach(mix => {

        html += `
        <div style="border:1px solid #e5e7eb;padding:10px;border-radius:8px;margin-bottom:8px;">
            <strong>Mix ${mix.mix_no}</strong>
            <div>${mix.ha} Ha | ${mix.water} L</div>
            <table style="width:100%;margin-top:6px;">
                <thead>
                    <tr>
                        <th align="left">Product</th>
                        <th align="right">Qty</th>
                    </tr>
                </thead>
                <tbody>
        `;

        mix.products.forEach(p => {
            html += `
                <tr>
                    <td>${p.stock_description || p.stock_id}</td>
                    <td align="right">${p.qty} ${p.uom || ''}</td>
                </tr>
            `;
        });

        html += `
                </tbody>
            </table>
        </div>
        `;
    });

    document.getElementById("mix-preview").innerHTML = html;
}

document.addEventListener("change", function(e){
    if (
        e.target.matches("#bhs_id") ||
        e.target.matches("#method_id") ||
        e.target.matches(".product-select") ||
        e.target.matches(".qty-input")
    ){
        fetchPreview();
    }
});

document.addEventListener("input", function(e){
    if (e.target.matches(".qty-input")){
        fetchPreview();
    }
});

// Handle form submission with fetch and SweetAlert
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('spray-form');
    if (!form) {
        console.error('Spray form not found');
        return;
    }
    
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        console.log('Form submission started');
        
        // Validate all required fields
        const sprayDate = document.getElementById('spray_date').value;
        const bhsId = document.getElementById('bhs_id').value;
        const methodId = document.getElementById('method_id').value;
        const warehouseId = document.getElementById('warehouse_id').value;
        
        if (!sprayDate) {
            Swal.fire({
                icon: 'warning',
                title: 'Missing Field',
                text: 'Please select a Date.',
                confirmButtonColor: '#f59e0b'
            });
            return;
        }
        
        if (!bhsId) {
            Swal.fire({
                icon: 'warning',
                title: 'Missing Field',
                text: 'Please select a Block Harvest Season.',
                confirmButtonColor: '#f59e0b'
            });
            return;
        }
        
        if (!methodId || methodId === '') {
            Swal.fire({
                icon: 'warning',
                title: 'Missing Field',
                text: 'Please select a Spray Method.',
                confirmButtonColor: '#f59e0b'
            });
            return;
        }

        if (!warehouseId || warehouseId === '') {
            Swal.fire({
                icon: 'warning',
                title: 'Missing Field',
                text: 'Please select a Warehouse.',
                confirmButtonColor: '#f59e0b'
            });
            return;
        }
        
        console.log('All validations passed. Submitting form.');
        
        const formData = new FormData(this);
        // Explicitly add method_id to ensure it's included
        formData.append('method_id', methodId);
        formData.append('warehouse_id', warehouseId);
        
        console.log('FormData prepared. Sending to server...');
        
        try {
            const response = await fetch('/agri/spray-recommendation/create', {
                method: 'POST',
                body: formData
            });
            
            console.log('Response received. Status:', response.status);
            
            const data = await response.json();
            console.log('Response data:', data);
            
            if (data.success) {
                Swal.fire({
                    icon: 'success',
                    title: 'Success!',
                    text: data.message,
                    confirmButtonColor: '#10b981'
                }).then(() => {
                    // Clear form and reload
                    document.getElementById('spray-form').reset();
                    clearLines();
                    location.reload();
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Error!',
                    text: data.message,
                    confirmButtonColor: '#ef4444'
                });
            }
        } catch (error) {
            console.error('Error during fetch:', error);
            Swal.fire({
                icon: 'error',
                title: 'Error!',
                text: 'An unexpected error occurred. Please try again. Check browser console for details.',
                confirmButtonColor: '#ef4444'
            });
        }
    });
});
</script>


{% endblock %}
