{% extends 'inventory_base.html' %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('market.static', filename='color-template.css') }}">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"/>

<style>

:root{
  --accent:#2563eb;
  --danger:#dc2626;
}

.page-wrap{
  max-width:1100px;
  margin:auto;
  padding:1.5rem;
}

.po-card{
  background:var(--container-bg);
  border-radius:12px;
  padding:1.3rem;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

.header{
  margin-bottom:1rem;
}

.title{
  font-size:1.2rem;
  font-weight:700;
}

.muted{
  font-size:.9rem;
  color:var(--secondary-text);
}

.section-title{
  font-weight:700;
  font-size:.95rem;
  margin:.8rem 0 .4rem;
}

/* Application Type */

.app-type-group{
  display:flex;
  gap:12px;
}

.app-type-card{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  border-radius:8px;
  border:1px solid #e2e8f0;
  cursor:pointer;
}

.app-type-card input{
  accent-color:var(--accent);
}

/* Inputs */

input,select{
  width:100%;
  padding:6px;
  border-radius:6px;
  border:1px solid #e2e8f0;
}
.select2-container{
  width:100% !important;
  max-width:100% !important;
}
.select2-container--default .select2-selection--multiple{
  min-height:38px;
  overflow:auto;
  white-space:normal;
}
.select2-container--default .select2-selection__choice{
  white-space:nowrap;
}
.select2-container .select2-dropdown {
  max-width:calc(100vw - 32px) !important;
  word-wrap: break-word;
}
.page-wrap, .po-card {
  overflow-x:hidden;
}

/* Project table */

.project-table{
  border:1px solid #e5e7eb;
  border-radius:8px;
  overflow:hidden;
}

.project-row{
  display:grid;
  grid-template-columns:1fr 80px 120px;
  gap:10px;
  padding:8px 10px;
  align-items:center;
  border-bottom:1px solid #f1f5f9;
}

.project-header{
  background:#f8fafc;
  font-weight:700;
}

.project-water-input{
  text-align:center;
  height:34px;
}

/* product lines */

.product-row{
  display:grid;
  grid-template-columns:1fr;
  gap:6px;
  padding:10px;
  border:1px solid #e5e7eb;
  border-radius:8px;
  background:#fff;
}
.product-row-top{ display:grid; grid-template-columns:1fr; }
.product-row-bottom{ display:grid; grid-template-columns: 1fr 90px 36px; gap:8px; align-items:center; }

.product-row-bottom .uom-label{ display:flex; align-items:center; justify-content:center; background:#f0f2f5; border-radius:6px; padding:0 8px; min-height:38px; }
.product-row-bottom .ibt-remove-btn{ width:36px; height:36px; border-radius:6px; }

@media (max-width: 760px) {
  .product-row-bottom{ grid-template-columns: 1fr 90px 36px; }
}

.qty-input{
  text-align:center;
}

.uom-label{
  background:#f0f2f5;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.ibt-remove-btn{
  background:#dc3545;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* buttons */

.btn{
  background:var(--accent);
  color:white;
  border:none;
  padding:.5rem .7rem;
  border-radius:7px;
  cursor:pointer;
}

.btn.ghost{
  background:transparent;
  border:1px solid #dbeafe;
  color:var(--accent);
}

.lines{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.controls{
  margin-top:.6rem;
}

</style>


<div class="page-wrap">

<div class="po-card">

<div class="header" style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
<div>
<div class="title">Create Spray Recommendation</div>
<div class="muted">Define projects and products to generate spray mixes</div>
</div>
<div style="text-align:right;">
  <div style="font-size:1.1rem;font-weight:700;">{{ spray_no }}</div>
</div>
</div>


<form id="spray-form">

<!-- APPLICATION TYPE -->

<label class="section-title">Application Type</label>

<div class="app-type-group">

<label class="app-type-card">
<input type="radio" name="application_type" value="spray" checked>
<div>
<strong>Spray</strong><br>
<small>Water based spraying</small>
</div>
</label>

<label class="app-type-card">
<input type="radio" name="application_type" value="direct">
<div>
<strong>Direct</strong><br>
<small>Granular / direct application</small>
</div>
</label>

</div>


<!-- DATE + DESCRIPTION + PROJECT -->

<section style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">

<div>
<label>Date</label>
<input type="date" id="spray_date" required>
</div>

<div>
<label>Spray Description</label>
<input type="text" id="spray_description" placeholder="Enter spray description">
</div>

</section>

<section style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">
<div>
<label>Projects</label>
<select id="project_ids" multiple class="select2">

{% for p in projects %}
<option value="{{p.ProjectLink}}" data-ha="{{p.ProjAttrHa}}">
{{p.ProjectCode}}
{% if p.CropCode %}- {{p.CropCode}}{% endif %}
{% if p.VarietyCode %}/{{p.VarietyCode}}{% endif %}
({{p.ProjAttrHa}} ha)
</option>
{% endfor %}

</select>
</div>
<div id="method-wrapper">

<label>Spray Method</label>
<select id="method_id" class="select2">
<option value="">Select method</option>
{% for m in methods %}
<option value="{{m.IdSprayMethod}}">{{m.SprayMethodName}}</option>
{% endfor %}
</select>
</div>
</section>

<!-- PROJECT CONFIG TABLE -->

<div id="project-configs" style="margin-top:10px"></div>


<!-- METHOD + WAREHOUSE -->

<section style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px">




<div>

<label>Warehouse</label>

<select id="warehouse_id" class="select2">
<option value="" selected disabled>Please select warehouse</option>
{% for w in warehouses %}
<option value="{{w.WhseLink}}">{{w.WhseDescription}}</option>
{% endfor %}

</select>

</div>

<div>
<label>Scouting Note</label>
<input id="scouting_note" type="text" maxlength="100" placeholder="Optional scouting note (max 100 chars)">
</div>

</section>


<hr style="margin:12px 0">


<!-- PRODUCT LINES -->

<h3>Products</h3>

<div id="lines" class="lines"></div>

<div class="controls">
<button type="button" class="btn" onclick="addLine()">Add Product</button>
<button type="button" class="btn ghost" onclick="clearLines()">Clear</button>
</div>


<hr style="margin:12px 0">

<div style="display:flex;justify-content:flex-end">
<button type="submit" class="btn">Save Recommendation</button>
</div>

</form>

</div>


<!-- MIX PREVIEW -->

<div id="mix-preview-wrapper" style="margin-top:16px">

<h3>Mix Preview</h3>

<div id="mix-preview"></div>

</div>

</div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


<script>

/* SELECT2 */

$('.select2').select2({width:'100%'}).on('select2:open', function(){
  setTimeout(()=>{
    const search = document.querySelector('.select2-container--open .select2-search__field');
    if(search) search.focus();
  }, 0);
});

/* PRODUCT OPTIONS */

let PRODUCT_OPTIONS = "";
let waterPerHaDefault = null;

async function loadProductsForWarehouse(warehouseId) {
  if (!warehouseId) {
    PRODUCT_OPTIONS = "";
    document.getElementById('lines').innerHTML = '';
    return;
  }
  try {
    const res = await fetch(`/inventory/fetch_products_linked_with_warehouse?warehouse_id=${warehouseId}`);
    const data = await res.json();
    const products = data.products || [];
    PRODUCT_OPTIONS = products.map(p => `
      <option value="${p.product_link}" data-uom-id="${p.stocking_uom_id || ''}" data-uom="${p.stocking_uom_code || ''}">
        ${p.product_code} - ${p.product_desc}(${p.qty_in_whse} ${p.stocking_uom_code || ''} available)
      </option>
    `).join('');
  } catch (error) {
    console.error('Failed to load products for warehouse', error);
    PRODUCT_OPTIONS = "";
  }
}


/* PROJECT CONFIG TABLE */

function updateProjectConfigs(){
  const ids = $('#project_ids').val() || []
  const container = document.getElementById('project-configs')
  container.innerHTML = ''

  if(ids.length === 0) return

  const header = document.createElement('div')
  header.className = 'project-row project-header'
  header.innerHTML = `
  <div>Project</div>
  <div>Ha</div>
  <div class="water-col">Water/Ha</div>
  `
  container.appendChild(header)

  ids.forEach(id=>{
    const option = document.querySelector(`#project_ids option[value="${id}"]`)
    const ha = option.dataset.ha
    const name = option.textContent

    const row = document.createElement('div')
    row.className = 'project-row'

    row.innerHTML = `
    <input type="hidden" name="project_id[]" value="${id}">
    <input type="hidden" name="project_ha[]" value="${ha}">
    <div>${name}</div>
    <div>${ha}</div>
    <div class="water-col">
      <input type="number" step="0.01" name="project_water_per_ha[]" class="project-water-input">
    </div>
    `
    row.querySelector('.project-water-input').value = waterPerHaDefault !== null ? waterPerHaDefault : ''
    container.appendChild(row)
  })
  
  toggleWaterColumn()
}


/* APPLICATION TYPE */
function getApplicationType(){
  return document.querySelector('input[name="application_type"]:checked').value
}

function toggleWaterColumn(){
  const spray=getApplicationType()==='spray'
  document.querySelectorAll('.water-col').forEach( el => {
    el.style.display = spray ? '' : 'none'
  })
}

function setQtyPlaceholders(){
  const spray = getApplicationType() === 'spray';
  document.querySelectorAll('.qty-input').forEach(input => {
    input.placeholder = spray ? 'Qty per 100L' : 'Qty per Ha';
  });
}

function toggleMethodAndPreview(){
  const spray=getApplicationType()==='spray'
  document.getElementById('method-wrapper').style.display = spray ? '' : 'none'
  document.getElementById('mix-preview-wrapper').style.display = spray ? '' : 'none'
  setQtyPlaceholders();
}


/* PRODUCT LINES */

let lineIndex=0

function addLine(){
  if (!document.getElementById('warehouse_id').value) {
    Swal.fire('Select Warehouse', 'Please select a warehouse before adding product lines.', 'warning');
    return;
  }
  const row=document.createElement('div')
  row.className='product-row'

  row.innerHTML=`
  <input type="hidden" name="line_uom_id[]" class="uom-id" value="">
  <div class="product-row-top">
    <div class="product-select-wrapper"><select class="product-select">${PRODUCT_OPTIONS}</select></div>
  </div>
  <div class="product-row-bottom">
    <input type="number" step="0.01" class="qty-input" placeholder="Qty per 100L">
    <div class="uom-label"></div>
    <button type="button" class="ibt-remove-btn" onclick="this.parentElement.parentElement.remove(); fetchPreview();">✕</button>
  </div>
  `
  document.getElementById('lines').appendChild(row)
  setQtyPlaceholders();
  const select2el = $(row).find('.product-select').select2({width:'100%'});
  const selected = row.querySelector('.product-select').selectedOptions?.[0];
  row.querySelector('.uom-label').textContent = selected?.dataset.uom || '';
  select2el.on('change', function(){
    const sel = this.selectedOptions?.[0];
    row.querySelector('.uom-label').textContent = sel?.dataset.uom || '';
    row.querySelector('.uom-id').value = sel?.dataset.uomId || '';
    fetchPreview();
  });
  if (!PRODUCT_OPTIONS) {
    row.querySelector('.product-select').innerHTML = '<option value="">Select warehouse first</option>';
    row.querySelector('.qty-input').disabled = true;
  }

  select2el.on('select2:open', function(){
    setTimeout(()=>{
      const search = document.querySelector('.select2-container--open .select2-search__field');
      if(search) search.focus();
    }, 0);
  });
}

function clearLines(){
  document.getElementById('lines').innerHTML=''
  fetchPreview();
}

function collectFormData(){
  const appType = getApplicationType();
  const methodId = document.getElementById('method_id').value;
  const methodName = document.getElementById('method_id').selectedOptions?.[0]?.text || '';
  const warehouseId = document.getElementById('warehouse_id').value;

  const projects=[];
  const projectIds = document.querySelectorAll('input[name="project_id[]"]');
  const projectHas = document.querySelectorAll('input[name="project_ha[]"]');
  const projectWaters = document.querySelectorAll('input[name="project_water_per_ha[]"]');

  for(let i = 0; i < projectIds.length; i++){
    projects.push({
      project_id: projectIds[i].value,
      ha: parseFloat(projectHas[i]?.value||0)||0,
      water_per_ha: appType==='spray' ? parseFloat(projectWaters[i]?.value||0)||0 : null
    });
  }

  const lines = [];
  document.querySelectorAll('.product-row').forEach(row=>{
    const select = row.querySelector('.product-select');
    const product = select?.value;
    const option = select?.selectedOptions?.[0];
    const qty = parseFloat(row.querySelector('.qty-input')?.value || 0);
    if(!product || !qty) return;
    const productText = option?.text || '';
    const [product_code, ...descParts] = productText.split(' - ');
    lines.push({
      stock_id: product,
      product_code: product_code ? product_code.trim() : '',
      stock_description: descParts.join(' - ').trim() || productText,
      uom_id: option?.dataset.uomId || '',
      uom: option?.dataset.uom || '',
      qty: qty,
      qty_type: appType === 'spray' ? 'per100l' : 'perha'
    });
  });

  return {
    application_type: appType,
    method_id: methodId,
    method_name: methodName,
    warehouse_id: warehouseId,
    spray_description: document.getElementById('spray_description').value || '',
    projects: projects,
    lines: lines
  };
}

function renderPreview(data, appType){
  const wrapper = document.getElementById('mix-preview-wrapper');
  if(appType!=='spray'){
    wrapper.style.display = 'none';
    return;
  }
  wrapper.style.display = 'block';

  if(!data.mixes || data.mixes.length===0){
    document.getElementById('mix-preview').innerHTML = '<div style="font-size:.9rem;color:#6b7280;">No mix preview yet.</div>';
    return;
  }

  let html = `<div style="margin-bottom:8px;font-size:.95rem;">Method: <strong>${data.method_name || 'N/A'}</strong> | Total Ha: <strong>${data.total_ha}</strong> | Total Water: <strong>${data.total_water} L</strong> | Mixes: <strong>${data.number_of_mixes}</strong></div>`;
  data.mixes.forEach(mix=>{
    html += `<div style="border:1px solid #e5e7eb;border-radius:8px;padding:8px;margin-bottom:8px;"><strong>Mix ${mix.mix_no}</strong><div>${mix.ha} Ha | ${mix.water} L</div><table style="width:100%;border-collapse:collapse;margin-top:6px;"><thead><tr><th align="left">Product</th><th align="right">Qty</th></tr></thead><tbody>`;
    mix.products.forEach(p=>{
      const productLabel = p.product_code ? `${p.product_code} - ${p.stock_description || ''}` : `${p.stock_description || p.stock_id}`;
      html += `<tr><td>${productLabel}</td><td align="right">${p.qty} ${p.uom||''}</td></tr>`;
    });
    html += '</tbody></table></div>';
  });
  document.getElementById('mix-preview').innerHTML=html;
}

function fetchPreview(){
  const data = collectFormData();
  const appType = data.application_type;

  if(appType !== 'spray'){
    document.getElementById('mix-preview-wrapper').style.display = 'none';
    return;
  }

  if(!data.projects.length || !data.lines.length || !data.method_id){
    document.getElementById('mix-preview').innerHTML = '<div style="font-size:.9rem;color:#6b7280;">Complete spray details to view mix preview.</div>';
    document.getElementById('mix-preview-wrapper').style.display = 'block';
    return;
  }

  fetch('/agri/spray-recommendation/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(r=>r.json()).then(result=>renderPreview(result,appType)).catch(()=>{
      document.getElementById('mix-preview').innerHTML='<div style="color:#b91c1c;">Preview error.</div>';
    });
}

/* EVENTS */
$('#project_ids').on('change', () => { updateProjectConfigs(); fetchPreview();});
$('input[name="application_type"]').on('change', () => { updateProjectConfigs(); toggleMethodAndPreview(); fetchPreview();});
$('#warehouse_id').on('change', async function(){
  const wid = this.value;
  await loadProductsForWarehouse(wid);
  document.getElementById('lines').innerHTML = '';
  addLine();
  fetchPreview();
});
$('#toggle-scouting').on('click', () => {
  const ta = document.getElementById('scouting_note');
  ta.style.display = ta.style.display === 'none' ? 'block' : 'none';
  if (ta.style.display !== 'none') ta.focus();
});
$('#method_id').on('change', function(){
  fetchMethodWater();
  fetchPreview();
});
$('#lines').on('input', '.qty-input', fetchPreview);
$('#lines').on('change', '.product-select', function(){
  const row = this.closest('.product-row');
  const selected = this.selectedOptions?.[0];
  if(row && selected){
    row.querySelector('.uom-label').textContent = selected.dataset.uom || '';
  }
  fetchPreview();
});
document.getElementById('project-configs').addEventListener('input', function(e){
  if(e.target.matches('.project-water-input')) fetchPreview();
});

function fetchMethodWater(){
  const methodId = document.getElementById('method_id').value;
  const waterInputs = document.querySelectorAll('.project-water-input');

  fetch(`/agri/spray-recommendation/method-water/${methodId}`)
    .then(r => r.json())
    .then(result => {
      if(result.water_per_ha !== null){
        waterPerHaDefault = result.water_per_ha;
        waterInputs.forEach(input => {
          input.value = result.water_per_ha;
        });
      } 
    })
    .catch((e) => {
      console.error('Failed to fetch method water per ha', e);
    });
}


/* INIT */
// Start with no product line until warehouse is selected
updateProjectConfigs();
toggleMethodAndPreview();
fetchPreview();

document.getElementById('spray-form').addEventListener('submit', function(event){
  event.preventDefault();
  const data = collectFormData();
  console.log(data)
  data.spray_date = document.getElementById('spray_date').value;
  data.scouting_note = document.getElementById('scouting_note').value || '';

  if(!data.spray_date){
    Swal.fire('Error', 'Please select a spray date.', 'error');
    return;
  }

  if(!data.projects.length){
    Swal.fire('Error', 'Please select at least one project.', 'error');
    return;
  }

  if(data.application_type === 'spray' && !data.method_id){
    Swal.fire('Error', 'Please select spray method for spray application.', 'error');
    return;
  }

  fetch('/agri/spray-recommendation/create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(r => r.json())
  .then(result => {
    if(result.success){
      Swal.fire('Success', result.message || 'Saved successfully.', 'success');
      // optionally reset form
      // window.location.href = '/agri/spray-recommendations-summary';
    } else {
      Swal.fire('Error', result.message || 'Save failed.', 'error');
    }
  })
  .catch(err => {
    console.error(err);
    Swal.fire('Error', 'Unexpected error saving recommendation.', 'error');
  });
});

</script>


{% endblock %}
