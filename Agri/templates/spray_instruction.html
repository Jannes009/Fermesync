{% extends 'inventory_base.html' %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('market.static', filename='color-template.css') }}">

<style>
.page-wrap{ padding:1.5rem; max-width:1300px; margin:0 auto; }

.main-card{
    background:var(--container-bg);
    border-radius:16px;
    box-shadow:0 8px 30px rgba(20,30,50,0.06);
    padding:1.75rem;
    position: relative;
}

/* Header Layout */
.header-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:1rem;
}

.header-item{
    background:white;
    padding:1rem;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.header-item h4{
    margin:0 0 5px 0;
    font-size:0.85rem;
    color:var(--secondary-text);
    text-transform:uppercase;
}

.header-item p{
    margin:0;
    font-weight:600;
    font-size:1rem;
}

/* Controls */
.controls{
    display:flex;
    flex-wrap:wrap;
    gap:1.5rem;
    margin-top:1.5rem;
    margin-bottom:1.5rem;
    align-items:flex-end;
}

/* Section Cards */
.section-card{
    background:white;
    border-radius:8px;
    border:1px solid #e8e8e8;
    margin-bottom:1.5rem;
    overflow:hidden;
}

.section-header{
    background:#f8f9fa;
    padding:0.75rem 1rem;
    font-weight:600;
    border-bottom:1px solid #e8e8e8;
    border-left:4px solid #2d6cdf;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#333;
}

.mix-body{
    padding:1rem;
}

table{
    width:100%;
    border-collapse:collapse;
}

.section-body{ 
    padding:1rem;
    overflow-x:auto;
}

th{
    text-align:left;
    font-size:0.8rem;
    text-transform:uppercase;
    color:var(--secondary-text);
    padding:8px;
    border-bottom:1px solid #eee;
}

td{
    padding:8px;
    border-bottom:1px solid #f2f2f2;
}

tr:hover{
    background:#f9fbff;
}

.no-data{
    text-align:center;
    padding:2rem;
    color:var(--secondary-text);
}

/* Edit Mode Styles */
.edit-btn, .save-btn, .cancel-btn, .add-btn, .remove-btn{
    padding:0.5rem 1rem;
    border:none;
    border-radius:6px;
    font-size:0.9rem;
    font-weight:500;
    cursor:pointer;
    transition:all 0.2s;
}

.edit-btn{
    background:#2d6cdf;
    color:white;
}

.edit-btn:hover{
    background:#1e4fa3;
}

.save-btn{
    background:#28a745;
    color:white;
}

.save-btn:hover{
    background:#218838;
}

.cancel-btn{
    background:#6c757d;
    color:white;
}

.cancel-btn:hover{
    background:#5a6268;
}

.add-btn{
    background:#17a2b8;
    color:white;
}

.add-btn:hover{
    background:#138496;
}

input[type="text"], input[type="date"], input[type="number"], select{
    padding:0.5rem;
    border:1px solid #ddd;
    border-radius:4px;
    font-size:0.95rem;
    font-family:inherit;
}

input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus, select:focus{
    outline:none;
    border-color:#2d6cdf;
    box-shadow:0 0 0 3px rgba(45, 108, 223, 0.1);
}

.form-group{
    margin-bottom:1rem;
}

.form-group label{
    display:block;
    font-weight:600;
    margin-bottom:0.4rem;
    font-size:0.9rem;
    color:var(--secondary-text);
}

.edit-actions{
    display:flex;
    gap:0.5rem;
    margin-top:1rem;
}

.section-header.edit-mode{
    background:#e8f4f8;
}

</style>

<div class="page-wrap">
  <div class="main-card">

    <h2 style="margin-bottom:1.5rem;">Spray Recommendation</h2>

    <!-- HEADER -->
    <div id="spray-header"></div>

    <div id="spray-lines"></div>

    <!-- MIX TABLE -->
    <div id="mix-container"></div>

  </div>
</div>

<script>

const sprayId = {{ spray_id }};
let sprayData = null;
let sprayType = null;
let editModes = {
    header: false,
    methods: false,
    projects: false,
    lines: false
};

document.addEventListener("DOMContentLoaded", async () => {
    await renderHeader();
    await renderLines();
    await renderMix();
    const methodSelect = document.getElementById("method-select");
});


async function renderHeader() {
    const header = await fetchHeader(sprayId);
    const method = header.method_id ? await fetchMethod(header.method_id) : null;

    sprayData = sprayData || {};
    sprayData.header = header;
    doseBasis = header.dose_basis;

    // Format dates
    const startDate = header.start_datetime ? new Date(header.start_datetime).toLocaleDateString() : 'N/A';
    const endDate = header.end_datetime ? new Date(header.end_datetime).toLocaleDateString() : 'N/A';

    // Build projects table only if mix is true
    let projectsSection = '';
    if (header.mix && header.projects && header.projects.length > 0) {
        const projectRows = header.projects.map(p => {
            let row = `<tr><td>${p.project_code}</td><td>${p.ha.toFixed(2)}</td>`;
            if (doseBasis === 'PER_100L') {
                row += `<td>${p.water_per_ha ? p.water_per_ha.toFixed(2) + ' L' : 'N/A'}</td><td>${p.total_water ? p.total_water.toFixed(2) + ' L' : 'N/A'}</td>`;
            }
            row += '</tr>';
            return row;
        }).join('');

        const waterHeaders = doseBasis === 'PER_100L' ? '<th>Water / Ha</th><th>Total Water</th>' : '';
        const methodDisplay = method ? `<div style="margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid #eee;"><strong>Method:</strong> ${method.method_name} | <strong>Water per Tank:</strong> ${header.water_per_tank ? header.water_per_tank.toFixed(2) + ' L' : 'N/A'}</div>` : '';
        const headerWaterInfo = `<div style="margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid #eee;"><strong>Water / Ha:</strong> ${header.water_per_ha ? header.water_per_ha.toFixed(2) + ' L' : 'N/A'} | <strong>Total Water:</strong> ${header.total_water ? header.total_water.toFixed(2) + ' L' : 'N/A'}</div>`;

        projectsSection = `
            <div class="section-card" style="margin-top:1rem;">
                <div class="section-header">
                    <span>Projects</span>
                    <span>${header.projects.length} project(s)</span>
                </div>
                <div class="section-body">
                    ${methodDisplay}
                    ${headerWaterInfo}
                    <table style="margin-bottom:0;">
                        <thead>
                            <tr><th>Project</th><th>Hectares</th>${waterHeaders}</tr>
                        </thead>
                        <tbody>
                            ${projectRows}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    const headerEditBody = editModes.header ? `
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="edit-description" value="${header.spray_description || ''}" class="form-control">
            </div>
            <div class="form-group">
                <label>Recommended Date</label>
                <input type="date" id="edit-date" value="${header.spray_date ? header.spray_date.split('T')[0] : ''}" onchange="updateWeekNo()">
            </div>
            <div class="form-group">
                <label>Week No</label>
                <input type="text" id="edit-week" value="${header.spray_week || ''}" readonly>
            </div>
            <div class="form-group">
                <label>Scouting</label>
                <input type="text" id="edit-scouting" value="${header.scouting || ''}" maxlength="100" class="form-control">
            </div>
            <div class="edit-actions">
                <button class="save-btn" onclick="saveHeaderEdit()">Save</button>
                <button class="cancel-btn" onclick="cancelHeaderEdit()">Cancel</button>
            </div>
        ` : `
            <div class="form-group">
                <p>Click edit to modify Description, Recommended Date, Week No, and Scouting.</p>
            </div>
        `;

    const actionButtons = [];;
    if (!editModes.header && !header.execution_id) {
        actionButtons.push(`<button class="cancel-btn" onclick="cancelRecommendation()">Cancel Recommendation</button>`);
    }
    if (!editModes.header && header.finalised && header.execution_finalised) {
        actionButtons.push(`<button class="save-btn" onclick="printInstruction()">Print</button>`);
    }

    let html = `
        <div class="header-grid">
            <div class="header-item"><h4>Description</h4><p>${header.spray_description || 'No description'}</p></div>
            <div class="header-item"><h4>Recommended Date</h4><p>${header.spray_date || 'N/A'}</p></div>
            <div class="header-item"><h4>Week No</h4><p>${header.spray_week || 'N/A'}</p></div>
            <div class="header-item"><h4>Status</h4><p>${header.status || 'N/A'}</p></div>
            <div class="header-item"><h4>Warehouse</h4><p>${header.warehouse ? header.warehouse.name : 'N/A'}</p></div>
            <div class="header-item"><h4>Spray Nr</h4><p>${header.spray_no || 'N/A'}</p></div>
            <div class="header-item"><h4>Start Date</h4><p>${startDate}</p></div>
            <div class="header-item"><h4>End Date</h4><p>${endDate}</p></div>
            <div class="header-item"><h4>Weather</h4><p>${header.weather || 'N/A'}</p></div>
            <div class="header-item"><h4>Scouting</h4><p>${header.scouting || 'N/A'}</p></div>
            <div>${actionButtons.join(' ')}</div>
        </div>
        <div class="section-card" style="margin-top:1rem;">
            <div class="section-header" id="header-section-header">
                <span>Basic Details</span>
                                <button class="edit-btn" onclick="toggleEditMode('header')">${editModes.header ? 'Cancel' : 'Edit'}</button>
            </div>
            <div class="section-body" id="header-section-content">
                ${headerEditBody}
            </div>
        </div>
        ${projectsSection}
    `;

    document.getElementById("spray-header").innerHTML = html;
}

async function renderLines() {
    sprayData = sprayData || {};
    let lines;
    if (editModes.lines && sprayData.lines) {
        lines = sprayData.lines;
    } else {
        lines = await fetchLines(sprayId);
        sprayData.lines = lines;
    }

    if (!lines || lines.length === 0) {
        document.getElementById("spray-lines").innerHTML =
            "<div class='no-data'>No spray lines found.</div>";
        return;
    }
    const qtyColumnText = doseBasis === 'PER_100L' ? "Qty / 100L" : "Qty / Ha";
    const editModeClass = editModes.lines ? 'edit-mode' : '';
    let productOptions = [];
    if (editModes.lines) {
        productOptions = await fetchProductsOptions(sprayId);
    }

    let html = `
        <div class="section-card">
            <div class="section-header ${editModeClass}">
                <span>Spray Lines</span>
                <div>
                    ${editModes.lines ? `<button class="save-btn" onclick="saveLinesEdit()">Save</button><button class="cancel-btn" onclick="cancelLinesEdit()">Cancel</button><button class="add-btn" onclick="addLine()">Add Line</button>` : (sprayData.header.issues_exist ? '' : `<button class="edit-btn" onclick="toggleEditMode('lines')">Edit</button>`)}
                </div>
            </div>
            <div class="section-body">
                <table>
                    <thead>
                        <tr>
                            <th>Stock Code</th>
                            <th>${qtyColumnText}</th>
                            <th>Total Qty</th>
                            ${editModes.lines ? '<th></th>' : ''}
                        </tr>
                    </thead>
                    <tbody id="lines-tbody">
    `;

    lines.forEach((line, idx) => {
        const qty = doseBasis === 'PER_100L' ? line.qty_per_100l : line.qty_per_ha;
        const qtyDisplay = qty !== null ? qty : 0;
        const totalQtyDisplay = line.total_qty !== null ? `<b>${line.total_qty.toFixed(2)} ${line.uom || ''}</b>` : '-';
        console.log(line.stock_code, typeof line.stock_id);

        if (editModes.lines) {
            const options = productOptions.map(product => `<option value="${product.stock_link}" ${product.stock_link === parseInt(line.stock_id) ? 'selected' : ''}>${product.stock_code}</option>`).join('');
            html += `
                <tr data-line-idx="${idx}">
                    <td>
                        <select data-line-idx="${idx}" onchange="handleLineProductChange(${idx})">
                            <option value="">Select product</option>
                            ${options}
                        </select>
                    </td>
                    <td><input type="number" class="line-qty-input" data-line-idx="${idx}" value="${qtyDisplay}" step="0.01" oninput="handleLineQtyChange(${idx})"></td>
                    <td><span class="total-qty-display">${totalQtyDisplay}</span></td>
                    <td><button class="remove-btn" onclick="removeLine(${idx})">Remove</button></td>
                </tr>
            `;
        } else {
            html += `
                <tr>
                    <td>${line.stock_code || '-'}</td>
                    <td>${qty !== null ? `${qty.toFixed(2)} ${line.uom || ''}` : '-'}</td>
                    <td>${totalQtyDisplay}</td>
                </tr>
            `;
        }
    });

    html += `
                    </tbody>
                </table>
            </div>
        </div>
    `;

    document.getElementById("spray-lines").innerHTML = html;
}

function handleLineProductChange(idx) {
    const select = document.querySelector(`select[data-line-idx="${idx}"]`);
    const line = sprayData.lines[idx];
    if (!select || !line) return;

    const selected = select.options[select.selectedIndex];
    line.stock_id = select.value || null;
    line.stock_code = selected ? selected.textContent : '';
    recalculateMixes();
}

function syncLineInputs() {
    const rows = document.querySelectorAll('tr[data-line-idx]');
    rows.forEach(row => {
        const idx = parseInt(row.dataset.lineIdx, 10);
        const line = sprayData.lines[idx];
        if (!line) return;

        const select = row.querySelector('select[data-line-idx]');
        if (select) {
            line.stock_id = select.value || null;
            const selected = select.options[select.selectedIndex];
            line.stock_code = selected ? selected.textContent : line.stock_code;
        }
        console.log(select ? select.value : null, line.stock_code, line.stock_id);
        const input = row.querySelector('input.line-qty-input');
        if (input) {
            const value = parseFloat(input.value);
            if (doseBasis === 'PER_100L') {
                line.qty_per_100l = isNaN(value) ? 0 : value;
            } else {
                line.qty_per_ha = isNaN(value) ? 0 : value;
            }
            const totalHa = sprayData.header.total_ha || 0;
            const totalWater = sprayData.header.total_water || 0;
            if (doseBasis === 'PER_100L' && totalWater > 0) {
                line.total_qty = ((line.qty_per_100l || 0) / 100) * totalWater;
            } else if (doseBasis === 'PER_HA' && totalHa > 0) {
                line.total_qty = ((line.qty_per_ha || 0) * totalHa);
            }
        }
    });
}

function addLine() {
    syncLineInputs();
    const newLine = {
        line_id: null,
        stock_id: null,
        stock_code: '',
        dose_basis: doseBasis,
        qty_per_100l: doseBasis === 'PER_100L' ? 0 : null,
        qty_per_ha: doseBasis === 'PER_HA' ? 0 : null,
        total_qty: 0,
        uom_id: null,
        uom: ''
    };
    sprayData.lines.push(newLine);

    // ensure an empty placeholder appears in the mix section too
    sprayData.mixLines = sprayData.mixLines || [];
    const firstMix = sprayData.mixLines[0] || {};
    const targetMixNumber = firstMix.mix_number != null ? Number(firstMix.mix_number) : 1;
    const placeholderIndex = sprayData.lines.length - 1;
    sprayData.mixLines.push({
        line_id: null,
        stock_id: newLine.stock_id,
        stock_code: newLine.stock_code,
        qty: newLine.total_qty,
        uom: newLine.uom,
        mix_number: targetMixNumber,
        water: firstMix.water != null ? firstMix.water : 0,
        mix_ha: firstMix.mix_ha != null ? firstMix.mix_ha : 0,
        placeholder_for_line_idx: placeholderIndex
    });

    renderLines();
    recalculateMixes();
}

function removeLine(idx) {
    syncLineInputs();
    sprayData.lines.splice(idx, 1);
    renderLines();
    recalculateMixes();
}

async function saveLinesEdit() {
    syncLineInputs();
    const payload = {
        lines: sprayData.lines.map(line => ({
            line_id: line.line_id,
            stock_id: line.stock_id,
            qty_per_100l: line.qty_per_100l,
            qty_per_ha: line.qty_per_ha,
            total_qty: line.total_qty,
            uom_id: line.uom_id
        }))
    };

    const response = await fetch(`/agri/spray/${sprayId}/edit_spray_lines`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    const result = await response.json();

    if (!response.ok || !result.success) {
        alert(`Error: ${result.message || 'Failed to save spray lines.'}`);
        return;
    }

    alert('Spray lines saved successfully!');

    editModes.lines = false;
    sprayData.lines = await fetchLines(sprayId);
    renderLines();
    await renderMix(true);
}

async function cancelLinesEdit() {
    editModes.lines = false;
    sprayData.lines = await fetchLines(sprayId);
    renderLines();
}

async function renderMix(forceFetch = false) {
    sprayData = sprayData || {};
    let lines = sprayData.mixLines;
    if (forceFetch || !lines) {
        lines = await fetchMixLines(sprayId);
        if (!lines) return;
        sprayData.mixLines = lines;
    }

    if (!lines || lines.length === 0) {
        document.getElementById("mix-container").innerHTML = 
            "<div class='no-data'>No spray lines found.</div>";
        return;
    }

    const mixGroups = {};
    lines.forEach(line => {
        if (!mixGroups[line.mix_number]) {
            mixGroups[line.mix_number] = [];
        }
        mixGroups[line.mix_number].push(line);
    });

    let html = "";

    Object.keys(mixGroups).sort((a,b)=>a-b).forEach(mixNo => {
        const mixLines = mixGroups[mixNo];
        const firstLine = mixLines[0];

        const waterDisplay = typeof firstLine.water === 'number' && !isNaN(firstLine.water) ? `${firstLine.water.toFixed(2)} L Water` : '-';
        const mixHaDisplay = typeof firstLine.mix_ha === 'number' && !isNaN(firstLine.mix_ha) ? `${firstLine.mix_ha.toFixed(2)} Ha` : '-';
        html += `
            <div class="section-card">
                <div class="section-header">
                    <span>Mix ${mixNo}</span>
                    <span>${waterDisplay} | ${mixHaDisplay}</span>
                </div>
                <div class="section-body">
                    <table>
                        <thead>
                            <tr>
                                <th>Stock Code</th>
                                <th>Qty</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        mixLines.forEach(line => {
            const qtyDisplay = typeof line.qty === 'number' && !isNaN(line.qty) ? line.qty.toFixed(2) : '-';
            html += `
                <tr>
                    <td>${line.stock_code || '-'}</td>
                    <td><b>${qtyDisplay} ${line.uom || ''}</b></td>
                </tr>
            `;
        });

        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    });
    
    document.getElementById("mix-container").innerHTML = html;
}

async function fetchHeader(sprayId) {
    return fetch(`/agri/spray/${sprayId}/spray_header`)
    .then(res => res.json())
    .then(data => data);
}

async function fetchLines(sprayId) {
    return fetch(`/agri/spray/${sprayId}/spray_lines`)
    .then(res => res.json())
    .then(data => data);
}

async function fetchMethod(methodId) {
    return fetch('/agri/spray/methods')
    .then(res => res.json())
    .then(data => data.find(m => m.id === methodId));
}

async function fetchMixLines(sprayId) {
    return fetch(`/agri/spray/${sprayId}/spray_mix_lines`)
    .then(res => res.json())
    .then(data => data);
}

async function fetchProductsOptions(sprayId) {
    return fetch(`/agri/spray/${sprayId}/fetch_products`)
    .then(res => res.json())
    .then(data => data);
}

// Edit Mode Functions
function toggleEditMode(section) {
    editModes[section] = !editModes[section];
    if (section === 'header') {
        renderHeader();
    } else if (section === 'lines') {
        renderLines();
    }
}

function updateWeekNo() {
    const dateInput = document.getElementById('edit-date');
    if (!dateInput.value) return;
    const date = new Date(dateInput.value);
    const weekNo = getWeekNumber(date);
    const year = date.getFullYear();
    document.getElementById('edit-week').value = `${year}-${String(weekNo).padStart(2, '0')}`;
}

function getWeekNumber(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function saveHeaderEdit() {
    const description = document.getElementById('edit-description').value;
    const date = document.getElementById('edit-date').value;
    const week = document.getElementById('edit-week').value;
    const scouting = document.getElementById('edit-scouting').value;
    
    const payload = {
        spray_description: description,
        spray_date: date,
        spray_week: week,
        scouting: scouting
    };

    fetch(`/agri/spray/${sprayId}/edit_spray_header`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(result => {
        if (!result.success) {
            alert(`Error: ${result.message || 'Failed to save header changes.'}`);
            return;
        }
        alert('Header changes saved successfully!');
        sprayData.header.spray_description = description;
        sprayData.header.spray_date = date;
        sprayData.header.spray_week = week;
        sprayData.header.scouting = scouting;
        editModes.header = false;
        renderHeader();
    })
    .catch(err => {
        alert(`Network error: ${err.message}`);
    });
}

function cancelInlineEdit() {
    editModes.header = false;
    renderHeader();
}

function cancelRecommendation() {
    if (!confirm('Cancel this spray recommendation? This cannot be undone.')) {
        return;
    }
    fetch(`/agri/spray/${sprayId}/cancel`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(response => response.json())
    .then(result => {
        if (!result.success) {
            alert(`Error: ${result.message || 'Failed to cancel spray recommendation.'}`);
            return;
        }
        alert('Spray recommendation cancelled.');
        sprayData.header.status = 'CANCELLED';
        renderHeader();
    })
    .catch(err => {
        alert(`Network error: ${err.message}`);
    });
}

function printInstruction() {
    window.open(`/agri/instruction/${sprayId}/instruction_pdf`, '_blank');
}

function cancelHeaderEdit() {
    editModes.header = false;
    renderHeader();
}

function handleLineQtyChange(idx) {
    const input = document.querySelector(`input[data-line-idx="${idx}"]`);
    const newQty = parseFloat(input.value) || 0;
    const line = sprayData.lines[idx];
    
    // Update line data
    if (doseBasis === 'PER_100L') {
        line.qty_per_100l = newQty;
    } else {
        line.qty_per_ha = newQty;
    }
    
    // Recalculate total qty
    const totalHa = sprayData.header.total_ha || 0;
    const totalWater = sprayData.header.total_water || 0;
    
    if (doseBasis === 'PER_100L' && totalWater > 0) {
        line.total_qty = (newQty / 100) * totalWater;
    } else if (doseBasis === 'PER_HA' && totalHa > 0) {
        line.total_qty = newQty * totalHa;
    }
    
    // Update display
    const row = document.querySelector(`tr[data-line-idx="${idx}"]`);
    const totalQtySpan = row.querySelector('.total-qty-display');
    totalQtySpan.innerHTML = `<b>${line.total_qty.toFixed(2)} ${line.uom || ''}</b>`;
    
    // Recalculate mixes
    recalculateMixes();
}

function recalculateMixes() {
    sprayData = sprayData || {};
    const sprayLines = sprayData.lines || [];
    const existingMixLines = Array.isArray(sprayData.mixLines) ? [...sprayData.mixLines] : [];

    if (!sprayLines.length) {
        renderMix();
        return;
    }

    const mixGroups = new Map();
    existingMixLines.forEach(line => {
        const mixNumber = line.mix_number != null ? Number(line.mix_number) : 1;
        if (!mixGroups.has(mixNumber)) {
            mixGroups.set(mixNumber, []);
        }
        mixGroups.get(mixNumber).push(line);
    });

    if (mixGroups.size === 0) {
        mixGroups.set(1, []);
    }

    const updatedMixLines = [];
    mixGroups.forEach((groupLines, mixNumber) => {
        const water = groupLines.find(line => line.water != null)?.water ?? 0;
        const mixHa = groupLines.find(line => line.mix_ha != null)?.mix_ha ?? 0;

        const placeholderIndexMap = new Map();
        const idMap = new Map();
        const codeMap = new Map();
        const usedKeys = new Set();

        groupLines.forEach(line => {
            if (typeof line.placeholder_for_line_idx === 'number') {
                placeholderIndexMap.set(Number(line.placeholder_for_line_idx), line);
            }
            if (line.stock_id != null) {
                idMap.set(`id:${line.stock_id}`, line);
            }
            if (line.stock_code) {
                codeMap.set(`code:${line.stock_code}`, line);
            }
        });

        sprayLines.forEach((line, idx) => {
            const basis = line.dose_basis || doseBasis;
            const qtyPerHa = typeof line.qty_per_ha === 'number' && !isNaN(line.qty_per_ha) ? line.qty_per_ha : 0;
            const qtyPer100L = typeof line.qty_per_100l === 'number' && !isNaN(line.qty_per_100l) ? line.qty_per_100l : 0;
            let qty = 0;

            if (basis === 'PER_HA') {
                qty = (typeof mixHa === 'number' && !isNaN(mixHa)) ? qtyPerHa * mixHa : 0;
            } else if (basis === 'PER_100L') {
                qty = (typeof water === 'number' && !isNaN(water)) ? (qtyPer100L / 100) * water : 0;
            } else {
                qty = typeof line.total_qty === 'number' && !isNaN(line.total_qty) ? line.total_qty : 0;
            }

            const existing = placeholderIndexMap.get(idx)
                || (line.stock_id ? idMap.get(`id:${line.stock_id}`) : null)
                || (line.stock_code ? codeMap.get(`code:${line.stock_code}`) : null);
            const mixLine = existing ? {
                ...existing,
                stock_id: line.stock_id,
                stock_code: line.stock_code,
                qty,
                uom: line.uom || existing.uom || '',
                placeholder_for_line_idx: idx,
                mix_number: mixNumber,
                water,
                mix_ha: mixHa
            } : {
                stock_id: line.stock_id,
                stock_code: line.stock_code,
                qty,
                uom: line.uom || '',
                mix_number: mixNumber,
                water,
                mix_ha: mixHa,
                placeholder_for_line_idx: idx
            };

            if (mixLine.stock_id != null) {
                usedKeys.add(`id:${mixLine.stock_id}`);
            }
            if (mixLine.stock_code) {
                usedKeys.add(`code:${mixLine.stock_code}`);
            }
            updatedMixLines.push(mixLine);
        });

        // Preserve any unmapped legacy mix lines that don't correspond to current spray lines.
        groupLines.forEach(line => {
            const keyId = line.stock_id != null ? `id:${line.stock_id}` : null;
            const keyCode = line.stock_code ? `code:${line.stock_code}` : null;
            const isPlaceholder = typeof line.placeholder_for_line_idx === 'number';
            if (isPlaceholder) return;
            if ((keyId && usedKeys.has(keyId)) || (keyCode && usedKeys.has(keyCode))) return;
            updatedMixLines.push({
                ...line,
                mix_number: mixNumber,
                water,
                mix_ha: mixHa
            });
        });
    });

    sprayData.mixLines = updatedMixLines;
    renderMix();
}

</script>
