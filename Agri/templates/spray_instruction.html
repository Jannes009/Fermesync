{% extends 'inventory_base.html' %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('market.static', filename='color-template.css') }}">

<style>
.page-wrap{ padding:1.5rem; max-width:1300px; margin:0 auto; }

.main-card{
    background:var(--container-bg);
    border-radius:16px;
    box-shadow:0 8px 30px rgba(20,30,50,0.06);
    padding:1.75rem;
    position: relative;
}

/* Header Layout */
.header-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:1rem;
}

.header-item{
    background:white;
    padding:1rem;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.header-item h4{
    margin:0 0 5px 0;
    font-size:0.85rem;
    color:var(--secondary-text);
    text-transform:uppercase;
}

.header-item p{
    margin:0;
    font-weight:600;
    font-size:1rem;
}

/* Controls */
.controls{
    display:flex;
    flex-wrap:wrap;
    gap:1.5rem;
    margin-top:1.5rem;
    margin-bottom:1.5rem;
    align-items:flex-end;
}

/* Mix Cards */
.mix-card{
    background:white;
    border-radius:14px;
    box-shadow:0 3px 12px rgba(0,0,0,0.05);
    margin-bottom:1.5rem;
    overflow:hidden;
}

.mix-header{
    background:linear-gradient(90deg, #2d6cdf, #1e4fa3);
    color:white;
    padding:0.9rem 1.2rem;
    font-weight:600;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.mix-body{
    padding:1rem;
}

table{
    width:100%;
    border-collapse:collapse;
}

.mix-body{ 
    padding:1rem;
    overflow-x:auto;
}

th{
    text-align:left;
    font-size:0.8rem;
    text-transform:uppercase;
    color:var(--secondary-text);
    padding:8px;
    border-bottom:1px solid #eee;
}

td{
    padding:8px;
    border-bottom:1px solid #f2f2f2;
}

tr:hover{
    background:#f9fbff;
}

.no-data{
    text-align:center;
    padding:2rem;
    color:var(--secondary-text);
}

.print-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    padding: 0.75rem;
    background: white;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.print-btn:hover {
    background: #f0f0f0;
}

.print-icon {
    width: 24px;
    height: 24px;
    fill: black;
}
</style>

<div class="page-wrap">
  <div class="main-card">
    <button class="print-btn" onclick="window.open('/agri/spray/{{ spray_id }}/instruction_pdf', '_blank')">
      <svg class="print-icon" viewBox="0 0 24 24">
        <path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zM16 19H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
      </svg>
    </button>

    <h2 style="margin-bottom:1.5rem;">Spray Execution</h2>

    <!-- HEADER -->
    <div id="spray-header"></div>

    <!-- ISSUED STOCK -->
    <div id="issued-stock-section" style="margin-top:1rem;"></div>

    <!-- MIX TABLE -->
    <div id="mix-container"></div>

  </div>
</div>

<script>

const sprayId = {{ spray_id }};
let sprayData = null;
let sprayType = null;

document.addEventListener("DOMContentLoaded", async () => {
    await renderMixHeader();
    await renderMixLines();
    await renderIssuedStock();
    const methodSelect = document.getElementById("method-select");
    if (methodSelect) {
        methodSelect.addEventListener("change", recalculate);
    }
});


async function renderMixHeader() {
    const header = await fetchHeader(sprayId);

    sprayData = sprayData || {};
    sprayData.header = header;
    sprayType = header.application_type;

    const projectRows = (header.projects || []).map(p => {
        if (header.application_type === 'spray') {
            return `<tr><td>${p.project_code}</td><td>${p.ha.toFixed(2)}</td><td>${p.water_per_ha ? p.water_per_ha + ' L' : 'N/A'}</td></tr>`;
        }
        return `<tr><td>${p.project_code}</td><td>${p.ha.toFixed(2)}</td></tr>`;
    }).join('');

    let html = `
        <div style="display:flex;justify-content:space-between;align-items:start;gap:1rem;flex-wrap:wrap;">
            <div class="header-grid" style="flex:1;min-width:250px;">
                <div class="header-item"><h4>Spray Date</h4><p>${header.spray_date}</p></div>
                <div class="header-item"><h4>Application Type</h4><p>${header.application_type}</p></div>
                <div class="header-item"><h4>Total Hectares</h4><p>${(header.total_ha || 0).toFixed(2)}</p></div>
            </div>
            <div style="min-width:220px;text-align:right;">
                <div style="font-size:1.2rem;font-weight:700;margin-bottom:0.4rem;">${header.spray_no || 'N/A'}</div>
                <div style="font-size:0.9rem;color:#333;">${header.spray_description || 'No description'}</div>
            </div>
        </div>

        <div class="mix-card" style="margin-top:1rem;">
            <div class="mix-header" style="background:linear-gradient(90deg, #1f7c3c, #155a2d);">
                <span>Projects</span>
                <span>${(header.projects || []).length} project(s)</span>
            </div>
            <div class="mix-body" style="padding:0.75rem;">
                <table style="margin-bottom:0;">
                    <thead>
                        <tr><th>Project</th><th>Hectares</th>${header.application_type === 'spray' ? '<th>Water / Ha</th>' : ''}</tr>
                    </thead>
                    <tbody>
                        ${projectRows || '<tr><td colspan="' + (header.application_type === 'spray' ? '3' : '2') + '">No projects found</td></tr>'}
                    </tbody>
                </table>
            </div>
        </div>
    `;

    // Method card moved to mix section using line-level method info

    document.getElementById("spray-header").innerHTML = html;
}

async function renderMixLines() {
    lines = await fetchLines(sprayId)

    // store lines for recalc / prefill
    sprayData = sprayData || {};
    sprayData.lines = lines;

    let methodHtml = '';
    if (lines && lines.length > 0 && lines[0].method_name) {
        methodHtml = `
            <div class="mix-card" style="margin-top:0.8rem;">
                <div class="mix-header" style="background:linear-gradient(90deg, #2d6cdf, #1e4fa3);">
                    <span>Spray Method</span>
                    <span>${lines[0].method_name || 'Unknown'}</span>
                </div>
                <div class="mix-body">
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0.5rem;">
                        <div><strong>Tank Size:</strong> ${lines[0].method_tank_size ? lines[0].method_tank_size + ' L' : 'N/A'}</div>
                    </div>
                </div>
            </div>
        `;
    }

    if (!lines || lines.length === 0) {
        document.getElementById("mix-container").innerHTML = 
            "<div class='no-data'>No spray lines found.</div>";
        return;
    }

    const mixGroups = {};
    lines.forEach(line => {
        if (!mixGroups[line.mix_number]) {
            mixGroups[line.mix_number] = [];
        }
        mixGroups[line.mix_number].push(line);
    });

    let html = "";
    if (sprayType === 'spray') {
        Object.keys(mixGroups).sort((a,b)=>a-b).forEach(mixNo => {
            const mixLines = mixGroups[mixNo];
            const firstLine = mixLines[0];

            html += `
                <div class="mix-card">
                    <div class="mix-header">
                        <span>Mix ${mixNo}</span>
                        <span>${firstLine.water} L Water | ${firstLine.mix_ha} Ha</span>
                    </div>
                    <div class="mix-body">
                        <table>
                            <thead>
                                <tr>
                                    <th>Stock Code</th>
                                    <th>Active Ingredient</th>
                                    <th>Qty</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            mixLines.forEach(line => {
                html += `
                    <tr>
                        <td>${line.stock_code || '-'}</td>
                        <td>${line.active_ingr || '-'}</td>
                        <td><b>${line.qty || '-'} ${line.uom || ''}</b></td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        });
    } else if (sprayType === 'direct') {
        html += `
            <div class="mix-card">
                <div class="mix-header">
                    <span>Direct Application</span>
                </div>
                <div class="mix-body">
                    <table>
                        <thead>
                            <tr>
                                <th>Stock Code</th>
                                <th>Active Ingredient</th>
                                <th>Reason</th>
                                <th>Withholding</th>
                                <th>Qty</th>
                            </tr>
                        </thead>
                        <tbody>
        `;
        lines.forEach(line => {
            html += `
                <tr>
                    <td>${line.stock_code || '-'}</td>
                    <td>${line.active_ingr || '-'}</td>
                    <td>${line.reason || '-'}</td>
                    <td>${line.withholding_period || '-'}</td>
                    <td><b>${line.total_qty || '-'} ${line.uom || ''}</b></td>
                </tr>
            `;
        });
        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    

    document.getElementById("mix-container").innerHTML = methodHtml + html;
}

async function fetchHeader(sprayId) {
    return fetch(`/agri/spray/${sprayId}/spray_header`)
    .then(res => res.json())
    .then(data => data);
}

async function fetchLines(sprayId) {
    return fetch(`/agri/spray/${sprayId}/spray_lines`)
    .then(res => res.json())
    .then(data => data);
}

async function fetchIssuedStock(sprayId) {
    return fetch(`/agri/spray/${sprayId}/issued_stock`)
        .then(res => res.json())
        .then(data => data.stock_movement || []);
}

async function renderIssuedStock() {
    const movement = await fetchIssuedStock(sprayId);
    const container = document.getElementById("issued-stock-section");

    if (!movement || movement.length === 0) {
        container.innerHTML = `
            <div class="mix-card">
                <div class="mix-header" style="background:linear-gradient(90deg, #9f9f9f, #6f6f6f);">
                    Stock Movement
                </div>
                <div class="mix-body no-data">No stock movement found for this spray.</div>
            </div>
        `;
        return;
    }

    const rows = movement.map(row => `
            <tr>
                <td>${row.stock_desc || 'Unknown'}</td>
                <td>${row.total_qty_on_instruction.toFixed(2)}</td>
                <td>${row.qty_issued.toFixed(2)}</td>
                <td>${row.qty_received.toFixed(2)}</td>
                <td>${row.qty_finalised.toFixed(2)}</td>
            </tr>
    `).join("");

    container.innerHTML = `
        <div class="mix-card">
            <div class="mix-header" style="background:linear-gradient(90deg, #2f5e9b, #1d436f);">
                <span>Stock Movement</span>
                <span>${movement.length} item(s)</span>
            </div>
            <div class="mix-body">
                <table>
                    <thead>
                        <tr>
                            <th>Stock Description</th>
                            <th>Total Qty on Instruction</th>
                            <th>Qty Out (Issued)</th>
                            <th>Qty In (Received)</th>
                            <th>Qty Finalised</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        </div>
    `;
}

function recalculate() {
    if (!sprayData) return;
    
    const methodId = document.getElementById("method-select").value;
    
    fetch(`/agri/spray/recalculate`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            spray_id: sprayId,
            method_id: methodId,
            lines: sprayData.lines
        })
    })
    .then(res => res.json())
    .then(result => {
        renderMixLines(sprayId);
    })
    .catch(err => console.error("Error recalculating:", err));
}

</script>

{% endblock %}
