{% extends "base.html" %}

{% block body %}
<style>
    @import url("{{ url_for('market.static', filename='color-template.css') }}");
    body {
        font-family: Arial, sans-serif;
        background-color: var(--primary-bg);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px 0;
        box-sizing: border-box;
    }

    .login-container {
        background-color: var(--container-bg);
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        padding: 24px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-sizing: border-box;
    }

    .login-logo {
        max-height: 140px;
        width: auto;
        margin-bottom: 10px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    h2 {
        margin-bottom: 20px;
        font-size: 24px;
        color: var(--primary-text);
    }

    form {
        display: flex;
        flex-direction: column;
    }

    .form-group {
        margin-bottom: 20px;
        text-align: left;
    }

    label {
        font-size: 14px;
        color: var(--primary-text);
        margin-bottom: 5px;
        display: block;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
        outline: none;
        border-color: var(--button-bg);
    }

    button {
        background-color: var(--button-bg);
        color: white;
        font-size: 16px;
        border: none;
        border-radius: 4px;
        padding: 12px;
        cursor: pointer;
        transition: background-color 0.3s;
        margin: 10px 0;
    }

    button:hover {
        background-color: var(--button-hover);
    }

    .page-container {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    @media (max-width: 480px) {
        body { padding: 12px 8px; }
        .login-container { padding: 16px; margin: 0 8px; }
        .login-logo { max-height: 100px; }
        h2 { font-size: 20px; }
        button { padding: 10px; font-size: 15px; }
    }
</style>

<div class="page-container">
    <img src="{{ url_for('market.static', filename='Image/LogoAndText.svg') }}" alt="Fermesync Logo" class="login-logo">
    <div class="login-container">
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <h2>Login</h2>
        <form id="login-form" method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <input type="hidden" name="next" value="{{ next or request.args.get('next') }}">
            <button type="submit">Login</button>
        </form>
    </div>
</div>

{% endblock %}
