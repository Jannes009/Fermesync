<div class="headers">
    <!-- Row 1: Delivery Info -->
    <div class="form-row">
        <div class="form-group input-container">
            <label for="ZZDelNoteNo">Delivery Note Number:</label>
            <div class="input-wrapper">
                <input type="text" id="ZZDelNoteNo" name="ZZDelNoteNo" required>
                <img id="verify-icon" src="{{ url_for('market.static', filename='Image/neutral.png') }}" 
                     alt="Status" class="verify-icon">
            </div>
        </div>
        <div class="form-group">
            <label for="ZZDelDate">Delivery Date:</label>
            <input type="date" name="ZZDelDate" required>
        </div>
        <div class="form-group">
            <label for="ZZTotalQty">Total Quantity:</label>
            <input type="number" id="ZZTotalQty" name="ZZTotalQty" required>
        </div>  
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="ZZAgentName">Agent Code:</label>
            <select name="ZZAgentName" class="searchable-dropdown" required>
                <option value="" disabled selected>Select an Agent</option>
                {% for agent in agent_codes %}
                    <option value="{{ agent.DCLink }}">{{ agent.display_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="ZZDestination">Destination:</label>
            <select name="ZZDestination" class="searchable-dropdown" required>
                <option value="" disabled selected>Select destination</option>
                {% for destination in destinations %}
                    <option value="{{ destination.idDestination}}">{{ destination.DestinationCode }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="ZZMarket">Packhouse:</label>
            <select name="ZZMarket" class="searchable-dropdown" required>
                    <option value="" disabled selected>Select Packhouse</option>
                    {% for market in market_codes %}
                    <option value="{{ market.WhseLink }}">{{ market.display_name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <!-- Row 3: Transporter + Transporter Cost -->
    <div class="form-row-2-cols">
        <div class="form-group">
            <label for="ZZTransporter">Transporter:</label>
            <select name="ZZTransporterCode" class="searchable-dropdown" required>
                <option value="" disabled selected>Select a Transporter</option>
                {% for transporter in transporter_codes %}
                    <option value="{{ transporter.TransporterAccount }}">{{ transporter.display_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="ZZTransporterCost">Transport Cost:</label>
            <input type="number" id="ZZTransporterCost" name="ZZTransporterCost" required>
        </div>
    </div>

    <!-- Row 4: Production Unit -->
    <div class="form-row">
        <div class="form-group" style="grid-column: span 3;">
            <label for="ZZProductionUnit">Default Production Unit:</label>
            <select name="ZZProductionUnitCode" class="searchable-dropdown">
                <option value="" disabled selected>Select a Production Unit</option>
                {% for production_unit in production_unit_codes %}
                    <option value="{{ production_unit.ProjectLink }}">{{ production_unit.display_name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
</div>
